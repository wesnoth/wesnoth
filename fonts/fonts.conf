<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
<!--

Wesnoth's text rendering code is not very well suited to RGB subpixel hinting
with Pango/Cairo (bug #20337), so we need to disable this feature to avoid
color glitches in GUI2 dialogs and other places. We also force a uniform
hintstyle for all platforms while at it.

-->

<match target="font">
	<edit mode="assign" name="rgba">
		<const>none</const>
	</edit>
</match>
<match target="font">
	<edit mode="assign" name="hinting">
		<bool>true</bool>
	</edit>
</match>
<match target="font">
	<edit mode="assign" name="hintstyle">
		<const>hintfull</const>
	</edit>
</match>
<match target="font">
	<edit mode="assign" name="antialias">
		<bool>true</bool>
	</edit>
</match>

<!-- 

Windows is forced to rely on this file as there is no system fontconfig available
to resolve generic CSS-style family names. So define monospace explicitly here.
See GitHub #7462.

-->

<alias>
	<family>monospace</family>
	<prefer>
		<family>DejaVu Sans Mono</family>
	</prefer>
</alias>

<!-- 

Scale down Noto Sans JP. 
It is bit taller than Lato and causes slight problems (See #10063). 

-->

<match target="font">
	<test name="family" compare="eq">
		<string>Noto Sans JP</string>
	</test>
	<edit name="matrix" mode="assign">
		<times>
		<name>matrix</name>
		<matrix>
			<double>0.94</double><double>0</double>
			<double>0</double><double>0.94</double>
		</matrix>
	</times>
	</edit>
</match>

</fontconfig>
