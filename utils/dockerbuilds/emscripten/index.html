<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>The Battle for Wesnoth - Web</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #canvas {
      display: block;
      outline: none;
      /* No CSS width/height override — let the canvas display at its native
         backing-store size (1280x720). On Emscripten, SDL2 uses
         getBoundingClientRect() for SDL_GetWindowSize. If CSS stretches the
         canvas beyond the backing store, SDL reports the CSS size for GUI
         layout but renders to the smaller backing store, causing mismatched
         dialog sizing. Keeping CSS size == backing store avoids this. */
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="1280" height="720" tabindex="0" aria-label="Wesnoth game canvas"></canvas>

  <script>
    (() => {
      try {
        Object.defineProperty(window, "devicePixelRatio", { value: 1, configurable: true });
      } catch (_err) {
        // Ignore if browser prevents overriding.
      }

      // Force preserveDrawingBuffer on all WebGL contexts (needed for
      // Playwright screenshots and pixel probes).
      const _origGetContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function (type, attrs) {
        if (type === "webgl" || type === "webgl2") {
          attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
        }
        return _origGetContext.call(this, type, attrs);
      };

      const canvas = document.getElementById("canvas");
      const bootTime = performance.now();
      const now = () => ((performance.now() - bootTime) / 1000).toFixed(2);
      const log = (text) => console.log(`[${now()}s] ${text}`);

      const formatReason = (reason) => {
        if (reason && typeof reason === "object" && "message" in reason) {
          return String(reason.message);
        }
        return String(reason);
      };

      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.async = false;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.body.appendChild(script);
        });

      window.addEventListener("keydown", (event) => {
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(event.key)) {
          event.preventDefault();
        }
      });
      window.addEventListener("error", (event) => {
        log(`window error: ${event.message}`);
      });
      window.addEventListener("unhandledrejection", (event) => {
        log(`unhandledrejection: ${formatReason(event.reason)}`);
      });

      window.render_game_to_text = () =>
        JSON.stringify({
          canvas: {
            width: canvas.width,
            height: canvas.height,
            clientWidth: canvas.clientWidth,
            clientHeight: canvas.clientHeight,
          },
          crossOriginIsolated: globalThis.crossOriginIsolated === true,
        });

      window.advanceTime = (_ms) => {
        // Native game loop is driven by Emscripten main loop.
      };

      window.Module = {
        arguments: ["--no-log-to-file", "--noaddons", "--windowed", "--resolution=1280x720", "--data-dir=/", "--userdata-dir=/userdata"],
        canvas,
        ENV: { SDL_VIDEO_HIGHDPI_DISABLED: "1" },
        locateFile: (path) => path,
        mainScriptUrlOrBlob: "wesnoth.js",
        preRun: [() => log("preRun")],
        postRun: [() => log("postRun")],
        print: (text) => log(String(text)),
        printErr: (text) => {
          console.warn(`[${now()}s] ${String(text)}`);
        },
        setStatus: (text) => {
          if (text) log(text);
        },
        monitorRunDependencies: (left) => {
          if (left === 0) log("all dependencies ready");
        },
        onRuntimeInitialized: () => {
          log("onRuntimeInitialized");
          canvas.focus();

          // Quick pixel probe after game should be rendering.
          setTimeout(() => {
            try {
              const gl = _origGetContext.call(canvas, "webgl2") || _origGetContext.call(canvas, "webgl");
              if (!gl) { log("[probe] no GL context"); return; }
              const px = new Uint8Array(4);
              gl.readPixels(640, 360, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
              log(`[probe] center pixel: rgba(${px[0]},${px[1]},${px[2]},${px[3]})`);
            } catch (e) {
              log(`[probe] error: ${e.message}`);
            }
          }, 10000);
        },
        onAbort: (what) => log(`aborted: ${what}`),
        onExit: (code) => log(`onExit: ${code}`),
      };

      // Resume AudioContext on user gestures (browser autoplay policy).
      // Not {once: true} — the context can re-suspend if the tab loses focus.
      function resumeAudioContext() {
        if (typeof Module !== "undefined" && Module.SDL2 && Module.SDL2.audioContext) {
          var ctx = Module.SDL2.audioContext;
          if (ctx.state === "suspended") {
            ctx.resume();
          }
        }
      }
      document.addEventListener("click", resumeAudioContext);
      document.addEventListener("keydown", resumeAudioContext);

      log(`crossOriginIsolated=${globalThis.crossOriginIsolated === true}`);
      log("loader booted");

      loadScript("wesnoth.data.js")
        .then(() => loadScript("wesnoth.js"))
        .catch((error) => {
          console.error(error);
        });
    })();
  </script>
</body>
</html>
