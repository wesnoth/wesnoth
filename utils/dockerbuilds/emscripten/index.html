<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>The Battle for Wesnoth - Web</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #ddd;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #root {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #canvas {
      width: 1280px;
      height: 720px;
      max-width: 100vw;
      max-height: 100vh;
      outline: none;
      image-rendering: auto;
      background: #000;
    }

    #status {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 10;
      max-width: calc(100vw - 16px);
      padding: 6px 8px;
      background: rgba(0, 0, 0, 0.6);
      color: #d8d8d8;
      font-size: 12px;
      line-height: 1.3;
      border-radius: 4px;
      pointer-events: none;
      white-space: pre-wrap;
    }

    #status.hidden {
      display: none;
    }

    #log {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: 8px;
      max-height: 30vh;
      overflow: auto;
      z-index: 11;
      margin: 0;
      padding: 6px 8px;
      background: rgba(0, 0, 0, 0.72);
      color: #9ee2ff;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.35;
      white-space: pre-wrap;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="status">booting...</div>
  <div id="root">
    <canvas id="canvas" width="1280" height="720" tabindex="0" aria-label="Wesnoth game canvas"></canvas>
  </div>
  <pre id="log"></pre>

  <script>
    (() => {
      try {
        Object.defineProperty(window, "devicePixelRatio", { value: 1, configurable: true });
      } catch (_err) {
        // Ignore if browser prevents overriding.
      }

      // Force preserveDrawingBuffer on all WebGL contexts (needed for
      // Playwright screenshots and pixel probes).
      const _origGetContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function (type, attrs) {
        if (type === "webgl" || type === "webgl2") {
          attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
        }
        return _origGetContext.call(this, type, attrs);
      };

      const canvas = document.getElementById("canvas");
      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");
      const bootTime = performance.now();

      const now = () => ((performance.now() - bootTime) / 1000).toFixed(2);
      const appendLog = (line) => {
        logEl.textContent += line + "\n";
        logEl.scrollTop = logEl.scrollHeight;
      };
      const setStatus = (text) => {
        statusEl.textContent = text;
      };
      const log = (text) => {
        const line = `[${now()}s] ${text}`;
        console.log(line);
        appendLog(line);
        setStatus(text);
      };
      const formatReason = (reason) => {
        if (reason && typeof reason === "object" && "message" in reason) {
          return String(reason.message);
        }
        return String(reason);
      };

      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.async = false;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.body.appendChild(script);
        });

      window.addEventListener("keydown", (event) => {
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(event.key)) {
          event.preventDefault();
        }
      });
      window.addEventListener("error", (event) => {
        log(`window error: ${event.message}`);
      });
      window.addEventListener("unhandledrejection", (event) => {
        log(`unhandledrejection: ${formatReason(event.reason)}`);
      });

      window.render_game_to_text = () =>
        JSON.stringify({
          status: statusEl.textContent,
          canvas: {
            width: canvas.width,
            height: canvas.height,
            clientWidth: canvas.clientWidth,
            clientHeight: canvas.clientHeight,
          },
          crossOriginIsolated: globalThis.crossOriginIsolated === true,
        });

      window.advanceTime = (_ms) => {
        // Native game loop is driven by Emscripten main loop.
      };

      const hideStatusLater = () => {
        setTimeout(() => statusEl.classList.add("hidden"), 4000);
      };

      window.Module = {
        arguments: ["--no-log-to-file", "--noaddons", "--nosound", "--windowed", "--resolution=1280x720", "--data-dir=/", "--userdata-dir=/userdata"],
        canvas,
        // Set ENV before Emscripten loads to avoid ASSERTIONS guard.
        ENV: { SDL_AUDIODRIVER: "dummy", SDL_VIDEO_HIGHDPI_DISABLED: "1" },
        locateFile: (path) => path,
        mainScriptUrlOrBlob: "wesnoth.js",
        preRun: [
          () => {
            log(`preRun ENV SDL_AUDIODRIVER=${Module.ENV.SDL_AUDIODRIVER}`);
          },
        ],
        postRun: [
          () => {
            log("postRun");
          },
        ],
        print: (text) => {
          log(String(text));
        },
        printErr: (text) => {
          log(`stderr ${String(text)}`);
          console.error(text);
        },
        setStatus: (text) => {
          if (text) {
            log(text);
          }
        },
        monitorRunDependencies: (left) => {
          log(`run dependencies: ${left}`);
        },
        onRuntimeInitialized: () => {
          log("onRuntimeInitialized");
          canvas.focus();
          hideStatusLater();

          // Quick pixel probe after game should be rendering.
          setTimeout(() => {
            try {
              const gl = _origGetContext.call(canvas, "webgl2") || _origGetContext.call(canvas, "webgl");
              if (!gl) { log("[probe] no GL context"); return; }
              const px = new Uint8Array(4);
              gl.readPixels(640, 360, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
              log(`[probe] center pixel: rgba(${px[0]},${px[1]},${px[2]},${px[3]})`);
            } catch (e) {
              log(`[probe] error: ${e.message}`);
            }
          }, 10000);
        },
        onAbort: (what) => {
          log(`aborted: ${what}`);
        },
        onExit: (code) => {
          log(`onExit: ${code}`);
        },
      };

      log(`crossOriginIsolated=${globalThis.crossOriginIsolated === true}`);
      log("loader booted");

      loadScript("wesnoth.data.js")
        .then(() => loadScript("wesnoth.js"))
        .catch((error) => {
          console.error(error);
          setStatus(error.message);
        });
    })();
  </script>
</body>
</html>
