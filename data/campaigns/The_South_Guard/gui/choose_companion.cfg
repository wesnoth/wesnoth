#textdomain wesnoth-tsg

[resolution]
    definition="menu"
    [helptip]
        id="tooltip_large"
    [/helptip]
    [tooltip]
        id="tooltip_large"
    [/tooltip]
    [grid]
        [row]
            [column]
                [label]
                    use_markup=true
                    label = "<span size='40000'> </span>"
                [/label]
            [/column]
            [column]
                border="right,left,bottom"
                border_size=18
                [grid]
                    #-----------------------
                    # TITLE
                    #-----------------------
                    [row]
                        [column]
                            [image]
                                label="icons/banner3.png"
                            [/image]
                        [/column]
                    [/row]
                    [row]
                        [column]
                            [label]
                                use_markup=true
                                label = "<span size='8000'> </span>"
                            [/label]
                        [/column]
                    [/row]
                    [row]
                        [column]
                            horizontal_alignment="center"
                            [label]
                                definition="title"
                                label=_"Choose an officer to accompany Deoran:"
                            [/label]
                        [/column]
                    [/row]
                    [row]
                        [column]
                            [label]
                                use_markup=true
                                label = "<span size='15000'> </span>"
                            [/label]
                        [/column]
                    [/row]
                    #-----------------------
                    # PORTRAITS
                    #-----------------------
                    [row]
                        [column]
                            [horizontal_listbox]
                                id="characters"
                                has_minimum=false
                                [list_definition]
                                    [row]
                                        [column]
                                            [toggle_panel]
                                                [grid]
                                                    [row]
                                                        [column]
                                                            border="all"
                                                            border_size=5
                                                            [image]
                                                                id="image"
                                                            [/image]
                                                        [/column]
                                                    [/row]
                                                    [row]
                                                        [column]
                                                            border="all"
                                                            border_size=5
                                                            [label]
                                                                id="name"
                                                                use_markup=true
                                                                text_alignment="center"
                                                            [/label]
                                                        [/column]
                                                    [/row]
                                                [/grid]
                                            [/toggle_panel]
                                        [/column]
                                    [/row]
                                [/list_definition]
                                [list_data]
                                    [row]
                                        [column]
                                            [widget]
                                                id="image"
                                                label="portraits/sir-gerrick.webp~SCALE(250,278)~CROP(0,58,250,220)"
                                            [/widget]
                                            [widget]
                                                id="name"
                                                label="<span size='x-large' face='WesScript'>" + _"Sir Gerrick" + "</span>
" + _"Veteran Infantryman"
                                            [/widget]
                                        [/column]
                                    [/row]
                                    [row]
                                        [column]
                                            [widget]
                                                id="image"
                                                label="portraits/mari.webp~SCALE(250,250)~CROP(0, 0,250,220)"
                                            [/widget]
                                            [widget]
                                                id="name"
                                                label="<span size='x-large' face='WesScript'>" + _"Captain Mari" + "</span>
" + _"Veteran Fencer"
                                            [/widget]
                                        [/column]
                                    [/row]
                                    [row]
                                        [column]
                                            [widget]
                                                id="image"
                                                label="portraits/hylas.webp~SCALE(250,250)~CROP(0, 0,250,220)"
                                            [/widget]
                                            [widget]
                                                id="name"
                                                label="<span size='x-large' face='WesScript'>" + _"Minister Hylas" + "</span>
" + _"White Mage"
                                            [/widget]
                                        [/column]
                                    [/row]
                                [/list_data]
                            [/horizontal_listbox]
                        [/column]
                    [/row]
                    #------------------------
                    # LEAVE WITH A COMPANION
                    #------------------------
                    [row]
                        [column]
                            [grid]
                                [row]
                                    [column]
                                        [button]
                                            id=leave_with_gerrick
                                            return_value=1
                                            label=_"Leave with Sir Gerrick"
                                        [/button]
                                    [/column]
                                    [column]
                                        [button]
                                            id=leave_with_mari
                                            return_value=2
                                            label=_"Leave with Captain Mari"
                                        [/button]
                                    [/column]
                                    [column]
                                        [button]
                                            id=leave_with_hylas
                                            return_value=3
                                            label=_"Leave with Minister Hylas"
                                        [/button]
                                    [/column]
                                [/row]
                                # this second row helps keep the table's formatting the same, even when 1+ buttons are hidden
                                [row]
                                    [column]
                                        [spacer]
                                            width=260
                                        [/spacer]
                                    [/column]
                                    [column]
                                        [spacer]
                                            width=260
                                        [/spacer]
                                    [/column]
                                    [column]
                                        [spacer]
                                            width=260
                                        [/spacer]
                                    [/column]
                                [/row]
                            [/grid]
                        [/column]
                    [/row]
                [/grid]
            [/column]
        [/row]
    [/grid]
[/resolution]
