#textdomain wesnoth-tsg

[resolution]
    definition="menu"
    [helptip]
        id="tooltip_large"
    [/helptip]
    [tooltip]
        id="tooltip_large"
    [/tooltip]
    [grid]
        [row]
            [column]
                [label]
                    use_markup=true
#ifdef SCHEMA_VALIDATION
    label=""
#else
    label="<span size='40000'> </span>"
#endif
                    
                [/label]
            [/column]
            [column]
                border="right,left,bottom"
                border_size=18
                [grid]
                    #-----------------------
                    # TITLE
                    #-----------------------
                    [row]
                        [column]
                            [image]
                                label="icons/banner3.png"
                            [/image]
                        [/column]
                    [/row]
                    [row]
                        [column]
                            [label]
                                use_markup=true
#ifdef SCHEMA_VALIDATION
    label=""
#else
    label="<span size='8000'> </span>"
#endif
                            [/label]
                        [/column]
                    [/row]
                    [row]
                        [column]
                            horizontal_alignment="center"
                            [label]
                                id="title"
                                definition="title"
                            [/label]
                        [/column]
                    [/row]
                    [row]
                        [column]
                            [label]
                                use_markup=true
#ifdef SCHEMA_VALIDATION
    label=""
#else
    label="<span size='15000'> </span>"
#endif
                            [/label]
                        [/column]
                    [/row]
                    #-----------------------
                    # INFO
                    #-----------------------
                    [row]
                        [column]
                            [grid]
                                [row]
                                    [column]
                                        horizontal_alignment="left"
                                        [label]
                                            id="tutor_message"
                                            use_markup=true
                                        [/label]
                                    [/column]
                                    [column]
                                        [label]
                                            use_markup=true
#ifdef SCHEMA_VALIDATION
    label=""
#else
    label="<span size='80000'> </span>"
#endif
                                        [/label]
                                    [/column]
                                    [column]
                                        [image]
                                            id="tutor_image"
                                        [/image]
                                    [/column]
                                [/row]
                            [/grid]
                        [/column]
                    [/row]
                    [row]
                        [column]
                            [label]
                                use_markup=true
#ifdef SCHEMA_VALIDATION
    label=""
#else
    label="<span size='15000'> </span>"
#endif
                                
                            [/label]
                        [/column]
                    [/row]
                    [row]
                        [column]
                            [image]
                                use_markup=true
                                label = "icons/banner2.png"
                            [/image]
                        [/column]
                    [/row]
                    [row]
                        [column]
                            [label]
                                use_markup=true
#ifdef SCHEMA_VALIDATION
    label=""
#else
    label="<span size='15000'> </span>"
#endif
                            [/label]
                        [/column]
                    [/row]
                    #------------------------
                    # BUTTONS
                    #------------------------
                    [row]
                        [column]
                            [grid]
                                [row]
                                    [column]
                                        [button]
                                            return_value=1
                                            use_markup=true
                                            label=_"Understood"
                                        [/button]
                                    [/column]
                                    [column]
                                        [label]
                                            use_markup=true
#ifdef SCHEMA_VALIDATION
    label=""
#else
    label="<span size='15000'>     </span>"
#endif
                                        [/label]
                                    [/column]
                                    [column]
                                        [button]
                                            return_value=2
                                            use_markup=true
                                            label=_"Disable Tip Popups &amp; Dialogue"
                                        [/button]
                                    [/column]
                                [/row]
                            [/grid]
                        [/column]
                    [/row]
                [/grid]
            [/column]
        [/row]
    [/grid]
[/resolution]
