#textdomain wesnoth-tdg

# using a separate unit, because this way I can remove the animations

[unit_type]
    id=Hunker Eldred
    name= _ "Crown Prince"
    race=human
    gender=male
    image="units/eldred-hunker/eldred.png"
    alignment=neutral
    # this HP number is also used for Human_Eldred_Magic.cfg
    # but it's slightly higher here, because he's level 0 and is thus affected less by resilient
    hitpoints={ON_DIFFICULTY4 146 196 196 196}
    movement=0
    movement_type=smallfoot
    level=0
    experience=200
    {AMLA_DEFAULT}
    usage=fighter
    hide_help=yes
    do_not_list=yes
    die_sound={SOUND_LIST:HUMAN_DIE}
    [resistance]
        blade,pierce,impact=0,0,0
        arcane,cold,fire=0,0,0
    [/resistance]
    [defense]
        castle=0 # this is normally the only hex this unit is ever on, outside of cutscenes
        flat=0   # in case of cataclysm
        frozen=0 # in case of blizzard
    [/defense]
[/unit_type]
