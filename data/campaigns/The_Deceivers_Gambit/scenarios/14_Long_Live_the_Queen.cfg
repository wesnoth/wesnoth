    ###########################################################################
    #                              PLAY SCENARIO
    ###########################################################################
    [event]
        name=start

        #############################
        # MAP OVERVIEW
        #############################
        {RECALL_XY Methor 45 4}
        [remove_event]
            id=herodeath_methor
        [/remove_event]
        [event]
            name=last breath {FILTER id=Methor}
            {FILTER_CONDITION( {NOT( {CONTINGENCY_GLOBAL_CONDITIONS} )} )}
            [message]
                speaker=Delfador
                message=_"No! Methor... Don’t die!"
            [/message]
            [message]
                speaker=Methor
                message=_"Delfador, my sweet, wonderful apprentice... I couldn’t be more proud of you..."
            [/message]
        [/event]

        {RECALL_HORSELORD 46 4} {MODIFY_UNIT id=$horselord_id facing sw}
        {RECALL_COMPANION 47 5} {MODIFY_UNIT id=$companion_id facing sw}
        {DELAY 500}

        {SCROLL_TO 2 7}
        {DELAY 500}
        {SCROLL_TO 26 20}
        {DELAY 500}
        {SCROLL_TO 60 21}
        {DELAY 500}
        {SCROLL_TO 45 5}

        #############################
        # DISCUSS THE SITUATION
        #############################
        [message]
            speaker=Methor
            #po: callback to S01 where Methor complains about Delfador not learning a seeker spell
            message= _ "Look at the length of that column! The prince — the king, I suppose — must have picked up more soldiers at Dan’Tonk, when he forced the magistrate to swear fealty. Your seeker spell was excellent, Delfador; we’ve been able to find and intercept Eldred before he could turn anyone else to his cause."
        [/message]
        [message]
            speaker=$companion_id
            message=_ "Boss, how’s we supposed to fight that many!? Even if we could, what about Queen Asheviere back in Weldyn?"
        [/message]
        [message]
            speaker=$horselord_id
            #po: said by a male Horseman-line or Cavalryman-line unit
            #po: "reigns" is a pun - "reigns of power", but also the kind of reins that you use to control a horse (this is a mounted unit speaking)
            message= _ "Indeed! Word is she’s killed half of the court and paid off the rest; the remaining lords of the city are loyal only to her! Eldred may be king, but Asheviere holds the reins."
        [/message]
        [message]
            speaker=Delfador
            message= _ "We don’t have to fight the entire army or deal with Weldyn. The capital is too well-defended for us to sack outright — Eldred is the objective here."
        [/message]
        [message]
            speaker=Delfador
            message= _ "Once the truth gets out about Garard’s death, we’ll have enough allies to liberate Weldyn and more besides. But only if we can stop Eldred here and now — can prove to the watchers that this coup is not yet over; that justice and honor and hope still live in Wesnoth! That’s our goal today."
        [/message]
        {DELAY 500}
        [message]
            speaker=$companion_id
            male_message=          _ "Look sharp, I think they’ve spotted us!"
            female_message= _ "female^Look sharp, I think they’ve spotted us!"
        [/message]

        #############################
        # ELDRED TAUNTS DELFADOR
        #############################
        [message]
            speaker=Eldred
            message= _ "Delfador, welcome! I was wondering if we’d get an appearance from you old has-been! ’fraid you’re not as popular with Mother and me as you were with old Garard."
        [/message]
        [message]
            speaker=Eldred
            message= _ "Opposing me is hopeless, old mage. But it’s not too late to save yourself — surrender now, disband your little rebel rabble, and we can tell the men it was all a big misunderstanding."
        [/message]
        [message]
            speaker=Eldred
            message= _ "Just lay down your staff and greet me with open arms. You can even have your old title back! “Delfador the Great”, High Advisor to the Crown — don’t you agree that has a nice ring to it?"
        [/message]
        [message]
            speaker=Delfador
            message= _ "I am no longer so foolish as to be tempted by <b><i>that</i></b>, young prince! Enough blood has been spilled on your behalf; stop this madness and give up the throne, or I shall make you."
        [/message]
        [message]
            speaker=Eldred
            message= _ "Oh no, I don’t think so. You forget you’re speaking to your king, old man. Soldiers, attack! ATTACK!"
        [/message]
        {TELEPORT_UNIT id=Delfador 49 2}
        {MODIFY_UNIT id=Delfador facing sw}

        #############################
        # OBJECTIVES
        #############################
        [objectives]
            [objective]
                description= _ "Defeat Eldred"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Delfador"
                condition=lose
            [/objective]
            {IS_LAST_SCENARIO}
        [/objectives]

        {RESELECT_SKILLS_AFTER_OBJECTIVES () ()}
    [/event]

    #############################
    # ELDRED FLAVOR 1
    #############################
    [event]
        name=turn 4
        [message]
            speaker=Delfador
            message= _ "Eldred, you know full well that your father and I were close! Is this what he would have wanted? His kingdom turned against itself, his townships pillaged by orcs? He had hope; a future for Wesnoth! A future for you!"
        [/message]
        [message]
            speaker=Eldred
            message= _ "A future for me? I can count on one hand the times the old tyrant had anything kind to say about me."
        [/message]
        [message]
            speaker=Eldred
            message= _ "I wasn’t going to wait around to be disinherited, or worse. It was always going to be him or me — I just beat him to the finish."
        [/message]
        [message]
            speaker=Delfador
            message= _ "Fool. I will not bandy words with whatever madness has taken root inside your mind, Eldred. Garard was harsh; I cannot deny that. But you’re a fool if you think he ever felt anything but love for you."
        [/message]
    [/event]
    [event]
        name=side 1 turn 4 end
        [message]
            speaker=Eldred
            message= _ "I’m no fool, Delfador. Day and night, my parents fought. Whether said in truth or in anger, there are some things my father can never take back."
        [/message]
        [message]
            speaker=Eldred
            message= _ "And don’t think that I have any illusions about what sort of snake Mother is either. I know, believe me. But she’s the snake who’s made me king, and that’s good enough."
        [/message]
    [/event]

    #############################
    # ELDRED FLAVOR 3
    #############################
    [event]
        name=turn 7
        [message]
            speaker=Eldred
            #po: this refers to the events of S05 The Deceiver and S06 Ring of Swords
            message= _ "This wasn’t the first time Mother’s gone after Garard, you know. In the early days of the war, she betrayed his plans to the Whitefangs; fled to the orcs while they surrounded you and him both."
        [/message]
        [message]
            speaker=Eldred
            message= _ "You and Deoran brought her back, of course, and Lionel fought Garard free of the orcs. My childhood would have been so different if things had succeeded..."
        [/message]
    [/event]

    #############################
    # ELDRED FLAVOR 4
    #############################
    [event]
        name=turn 10
        # this line might play during the duel, if you really rush down Eldred. But that's ok; the lines still make sense (Eldred's ID is different so only Delfador speaks)
        [message]
            speaker=Eldred
            message= _ "I’m surprised you haven’t given up yet, wizard! But you’re no stranger to hopeless fights, are you — you bested Malal, escaped the frozen north, scattered our saurians."
        [/message]
        [message]
            speaker=Eldred
            message= _ "Malal was clever; <i>really</i> clever, and determined too. No-one but Mother knows what Garard did to earn Malal’s ire, but the two of them would stop at nothing to see Garard dead and his reputation destroyed. Tricking the saurians and orcs into working together, getting Lionel sent away, pitting Garard against Arand..."
        [/message]
        [message]
            speaker=Eldred
            message= _ "Delfador, you weren’t supposed to survive Malal. You weren’t supposed to survive <i><b>any</b></i> of that."
        [/message]
        [message]
            speaker=Delfador
            message= _ "Would that more had survived along with me, Eldred. Would that I had listened to Deoran, would that I had understood the seer! Had I been but a little wiser, so many lives might yet have been saved."
        [/message]
        [message]
            speaker=Delfador
            message= _ "I can never atone for the lives I cost, but I can yet honor them through my actions. And right now, honoring them means stopping you."
        [/message]
    [/event]

    #############################
    # TRACK ACHIEVEMENT
    #############################
    [event]
        name=moveto
        first_time_only=no
        [filter]
            id=Delfador
        [/filter]
        [filter_condition]
            {VARIABLE_CONDITIONAL failed_achievement not_equals yes}
        [/filter_condition]
        {VARIABLE failed_achievement yes}
        [allow_undo]
        [/allow_undo]
        [on_undo]
            {CLEAR_VARIABLE failed_achievement}
        [/on_undo]
    [/event]

    #############################
    # ELDRED DRINKS THE POTION
    #############################
    [event]
        name=last breath
        {FILTER id=Eldred}

        {IF} {VARIABLE_CONDITIONAL failed_achievement not_equals yes} {THEN({ACHIEVE s14})}
        {/IF}
        {CLEAR_VARIABLE failed_achievement}

        {FIRE_EVENT skill_shield_cancel}
        {FIRE_EVENT skill_levitate_cancel}
        {FIRE_EVENT skill_counterspell_cancel}
        {FIRE_EVENT skill_polymorph_stoat_cancel}
        {FIRE_EVENT skill_polymorph_bear_cancel}
        {FIRE_EVENT skill_polymorph_crab_cancel}
        {FIRE_EVENT skill_polymorph_roc_cancel}
        {FIRE_EVENT skill_illusion_cancel}

        [message]
            speaker=Eldred
            message= _ "NO!"
        [/message]
        [message]
            speaker=Delfador
            message= _ "It’s over, Eldred. Down on your knees, now! The rest of you; get back! BACK, or you’ll have to find yet another king!"
        [/message]
        [message]
            speaker=Eldred
            message= _ "I didn’t come all this way just to fail now... not at the hand of some cheap conjurer. No, I prepared for this. After my failed attack on Arand, I took... precautions."
        [/message]
        [message]
            speaker=Eldred
            message= _ "They say this elixir came all the way from the Old Continent, Delfador. Persuading Malal to give it up wasn’t easy.

You like magic so much? Once I drink from Jevyan’s Cup, I’ll have enough magic to turn you all to dust!"
        [/message]
        [message]
            speaker=Delfador
            # po: liches are skeletal; they don't have blood. This is a consumable artifact of unknown composition, probably captured/extracted from lich-lord Jevyan
            message= _ "Is that— are you holding <i>lich’s blood</i>!? How— Put it down, Eldred!"
        [/message]
        [message]
            speaker=Delfador
            message= _ "Whatever you do, don’t you dare drink it! We have no idea what will happen! Don’t you dare, Eldred! ELDRED!"
        [/message]
        {SCROLL_TO 24 20}
        {SOUND skill-panacea.wav}
        {FADE_MUSIC_OUT 1300}
        {FIRE_EVENT play_phase_2}
        # Eldred's potion is both an excuse for a boss fight, and also a semi-explanation for Liberty's cursed soldiers.
    [/event]

    ###########################################################################
    #                                  PHASE TWO
    ###########################################################################
    [event]
        name=play_phase_2

        {REPLACE_SCENARIO_MUSIC silence.ogg}
        {FADE_MUSIC_IN 0}
        [change_theme]
            theme=Cutscene_Minimal
        [/change_theme]
        {QUAKE ()}
        {SCREEN_FADER 100,0,0 255 0}
        {SOUND skill-cataclysm-end.wav}

        #############################
        # CLEAR OLD UNITS
        #############################
        {MODIFY_UNIT id=Eldred hitpoints 1}
        [store_unit]
            {FILTER id=Eldred}
            variable,kill=stored_eldred,yes
        [/store_unit]
        [store_unit]
            {FILTER( {NOT id=Delfador,familiar} )}
            variable,kill=stored_units_s13,yes # from any side
        [/store_unit]

        # end turn so that we get a fresh autosave
        [end_turn]
        [/end_turn]
        [event]
            name=new turn
            #############################
            # REPLACE THE MAP
            #############################
            {FIRE_EVENT skill_levitate_cancel} # otherwise levitate can somehow get Delfador killed
            [replace_map]
                map_file=14b_Long_Live_the_Queen.map
                expand,shrink=yes,yes
            [/replace_map]
            {REMOVE_IMAGE 0-99 0-99}
            [replace_schedule]
                [time]
                    id=void
                    name=_"Void"
                    image=misc/schedule-void.png
                    red,green,blue=50,-50,-50
                    lawful_bonus=-25
                [/time]
            [/replace_schedule]
            [remove_time_area]
                id=brazier1
            [/remove_time_area]
            [capture_village] # clear all villages, so Delfador can't keep getting bonus income
            [/capture_village]

            #############################
            # PREPARE DELFADOR
            #############################
            {TELEPORT_UNIT id=Delfador 26 19}
            {MODIFY_UNIT id=Delfador facing sw}
            {TELEPORT_UNIT id=familiar 27 20}
            {MODIFY_UNIT id=familiar facing sw}
            [heal_unit]
                {FILTER id=Delfador}
                moves=full
                restore_attacks=yes
            [/heal_unit]
            [modify_side]
                side=1
                gold=10
                income=0
                # so the player can summon a few mudcrawlers/fire guardians, if they choose those spells. But no bonus income, or else it's possible to distract Eldred's AI forever with mudcrawlers
                fog,reset_view=yes,yes
            [/modify_side]

            [lift_fog]
                multiturn=yes {FILTER_SIDE side=1}
                x,y,radius=24,20,6
            [/lift_fog]
            [lift_fog]
                multiturn=yes {FILTER_SIDE side=1}
                x,y,radius=24,18,6
            [/lift_fog]
            [lift_fog]
                multiturn=yes {FILTER_SIDE side=1}
                x,y,radius=28,21,4
            [/lift_fog]
            [redraw][/redraw]

            # always start with max XP, so that a first-time player won't wish they'd known about this fight so they could've saved XP earlier
            # and prevent recruiting/recalling (except for summoning, if the player chooses those spells)
            [modify_unit]
                {FILTER id=Delfador}
                experience="$( $this_unit.max_experience -1 )"
                extra_recruit=
                [filter_recall]
                    race=disable_delfador_recalling
                [/filter_recall]
            [/modify_unit]

            #############################
            # PREPARE ELDRED
            #############################
            [unit]
                id=MiddleEldred
                name=_"Eldred"
                type=King Eldred # use a new ID so events don't interfere
                side=2
                x,y=24,20
                facing=ne
                profile=portraits/eldred.webp
                [modifications]
                    {TRAIT_RESILIENT} {TRAIT_INTELLIGENT}
                    [object]{EFFECT overlay add=misc/leader-crown.png}
                    [/object]
                [/modifications]
            [/unit]
            {SCROLL_TO 24 20}
            {DELAY 3000}
            {SCREEN_FADER 0,0,0 0 3000}
            # force Eldred to always attack; the default AI will sometimes make him go hide
            [micro_ai]
                side=2
                ai_type=simple_attack
                action=add
                ca_score=300000 # higher than every other CA
                {FILTER id=MiddleEldred,FinalEldred} # exclude the ghosts
            [/micro_ai]
            [micro_ai]
                side=3
                ai_type=simple_attack
                action=add
                ca_score=300000 # higher than every other CA
                {FILTER id=MiddleEldred,FinalEldred} # exclude the ghosts
            [/micro_ai]
            # once Eldred starts getting two attacks, prioritize attacking Mudcrawlers (if available)
            # it can look silly for him to ignore them completely, and they can add a lot of damage into the fight
            [micro_ai]
                side=3
                ai_type=simple_attack
                action=add
                ca_score=400000 # higher than every other CA
                {FILTER id=MiddleEldred,FinalEldred} # exclude the ghosts
                {FILTER_SECOND type_adv_tree=Mudcrawler}
            [/micro_ai]

            #############################
            # DIALOGUE
            #############################
#define MAGIC_ELDRED_MESSAGE STRING
    "<span color='#CC0000' size='small' font_weight='bold'>" + {STRING} + "</span>"
#enddef
            {DELAY 3000}
            [message]
                speaker=narrator
                message={MAGIC_ELDRED_MESSAGE _"Finally."}
            [/message]
            {DELAY 3000}
            [message]
                speaker=narrator
                message={MAGIC_ELDRED_MESSAGE _"Finally, I understand."}
            [/message]
            [message]
                speaker=narrator
                message={MAGIC_ELDRED_MESSAGE _"I can make the pain all go away. I can make everything better again."}
            [/message]
            {DELAY 1500}
            [message]
                speaker=Delfador
                message= _ "...you can?"
            [/message]
            {MOVE_UNIT id=MiddleEldred 25 20}
            [harm_unit]
                {FILTER id=Delfador}
                {FILTER_SECOND id=MiddleEldred}
                [primary_attack]
                    range=melee
                [/primary_attack]
                amount=9
                damage_type=fire
                animate=yes
                delay=0
                experience=no
            [/harm_unit]
            [message]
                speaker=narrator
                message={MAGIC_ELDRED_MESSAGE _"I just need to kill everyone else first."}
            [/message]
            {REPLACE_SCENARIO_MUSIC helios.ogg}

            [change_theme]
            [/change_theme]

            #############################
            # OBJECTIVES
            #############################
            [objectives]
                [objective]
                    description= _ "Defeat Eldred"
                    condition=win
                [/objective]
                [objective]
                    description= _ "Death of Delfador"
                    condition=lose
                [/objective]
                {IS_LAST_SCENARIO}
            [/objectives]
            {RESELECT_SKILLS_AFTER_OBJECTIVES () ()}
        [/event]
    [/event]

    ###########################################################################
    #                                 MIRROR IMAGES
    ###########################################################################
    [event]
        name=side 2 turn refresh
        [filter_condition]
            [have_unit]
                id=MiddleEldred
                # on Easy/Normal we only create illusions once, so wait until later to trigger them
                formula=(self.hitpoints < self.max_hitpoints * {ON_DIFFICULTY4 2 2 3 3} / 4)
            [/have_unit]
        [/filter_condition]
        [message]
            speaker=narrator
            message={MAGIC_ELDRED_MESSAGE _"Everything is so clear now. I see the past; the future."}
        [/message]
        [message]
            speaker=narrator
            message={MAGIC_ELDRED_MESSAGE _"Your eyes were clouded. You could not tell the truth from the lie."}
        [/message]
        [event]
            name=explain_mirrors
            [message]
                speaker=narrator
                message={MAGIC_ELDRED_MESSAGE _"You still can’t, can you?"}
            [/message]
        [/event]
        {MODIFY_UNIT id=MiddleEldred moves 0}
        {MODIFY_UNIT id=MiddleEldred attacks_left 0}
        {GIVE_OBJECT_TO id=MiddleEldred (
            {EFFECT new_animation (
                [animation]
                    apply_to=pre_teleport
                    {TELEPORT_OUT_ANIMATION}
                [/animation]
            )}
        )}

        #############################
        # DEFINE MIRRORS MACRO
        #############################
        # originally, there was a real eldred and an illusory mirror image, but I found that introduced too much RNG and guesswork into the fight
        # instead, Eldred now vanishes and creates 2 mirror images. When you break one mirror, Eldred appears in the space of the remaining mirror
#define MAKE_MIRROR ID X Y
    {VARIABLE stored_midEldred.id {ID}}
    [unstore_unit]
        variable=stored_midEldred
        x,y={X},{Y}
        find_vacant=yes
    [/unstore_unit]
    {VARIABLE stored_midEldred.id MiddleEldred}

    [modify_unit]
        {FILTER id={ID}}
        [object]
            id=mirror_object
            {EFFECT level set=0}
            {EFFECT zoc value=no}
            {EFFECT halo halo="halo/holy/light-beam-5.png~CROP(0,0,150,500)~SCALE(108,144)~CS(-159,-255,-159)~MASK(terrain/misc/smoke-A[01~12].png~SCALE(108,144)):100"}
            {EFFECT new_animation (
                [animation]
                    apply_to=post_teleport
                    {TELEPORT_IN_ANIMATION}
                [/animation]
            )}
            {EFFECT new_animation (
                [animation]
                    apply_to,base_score=death,99 # override other death animations
                    smoke_1_start_time,start_time,smoke_2_start_time=0,200,400
                    [smoke_1_frame]
                        sound=skill-polymorph-quiet.wav
                        image="terrain/misc/smoke-A[01~12,01~12,01~12].png~SCALE([72~143],[144~215]):50"
                        y,auto_vflip,image_mod=0~-200,no,"~CS(-31,-255,-31)"
                        alpha=0~1,1,1,1~0
                    [/smoke_1_frame]
                    [frame]
                        duration,image_mod=150,"~CS(127,0,127)~BL([15,10,20,30,40,50,60,70])"
                        blend_ratio,blend_color=0~1,255,255,255
                        alpha=1,1~0
                    [/frame]
                    [smoke_2_frame]
                        image="terrain/misc/smoke-A[01~12,01~12,01~12].png~SCALE([72~143],[144~215]):30"
                        y,auto_vflip,image_mod=0~-200,no,"~CS(-31,-255,-31)"
                        alpha=0~1,1,1,1~0
                    [/smoke_2_frame]
                [/animation]
            )}
        [/object]
    [/modify_unit]
    {SOUND skill-illusion-quiet.wav}
    {ANIMATE_UNIT id={ID} post_teleport}
#enddef
        #############################
        # REFRESH MIRRORS EACH TURN
        #############################
        # the mirror image turn order prevents Eldred from healing, which lets Delfador hide in the dead space and rest-heal (maybe after poisoning Eldred)
        # to avoid that, disable mirror images if there hasn't been any active combat for a couple turns
        {VARIABLE recent_combats 2}
        [event]
            name=attack
            first_time_only=no
            {VARIABLE recent_combats "$( min([ 2, $recent_combats+1 ]) )"}
        [/event]
        [event]
            name=side 2 turn end
#ifndef EASY
#ifndef NORMAL
            first_time_only=no
#endif
#endif
            [filter_condition]
                {HAVE_UNIT id=MiddleEldred}
                {VARIABLE_CONDITIONAL recent_combats greater_than 0}
            [/filter_condition]

            {VARIABLE recent_combats "$( max([ 0, $recent_combats-1 ]) )"}

            {VARIABLE i 1}
            {VARIABLE min_distance ({ON_DIFFICULTY4 1 3 5 5})}
            [while]
                [not]
                    {HAVE_UNIT id=Mirror1}
                    {HAVE_UNIT id=Mirror2}
                [/not]
                [do]
                    # start with restrictive settings. Did we find a match?
                    # if not, get progressively more lax
                    {VARIABLE j 1}
                    {CLEAR_VARIABLE loc1_x,loc1_y,loc2_x,loc2_y}
                    [random_placement]
                        [filter_location]
                            [not][/not]
                            # first iteration: check specific hexes that aren't adjacent to Delfador's units
                            # don't filter by terrain, because Delfador might've destroyed terrain with Cataclysm
                            [or]
                                formula=( $i=1 )
                                x=21,21, 25,25, 26,27, 27
                                y=20,21, 17,18, 22,23, 20
                                [not]
                                    radius=1
                                    {FILTER side=1}
                                [/not]
                            [/or]
                            # second iteration: allow standing adjacent to one of Delfador's units
                            # also, min_distance has decreased (as it does every iteration)
                            [or]
                                formula=( $i=2 )
                                x=21,21, 25,25, 26,27, 27
                                y=20,21, 17,18, 22,23, 20
                                {NOT({FILTER side=1})}
                            [/or]
                            # third iteration: allow any unoccupied, passable hex
                            # also, min_distance has decreased (as it does every iteration)
                            [or]
                                formula=( $i>=3 )
                                [and]
                                    x,y=25,20
                                    radius=4
                                [/and]
                                terrain=!,Q*^*,*^X*
                                {NOT({FILTER side=1})}
                            [/or]
                        [/filter_location]
                        num_items=2
                        min_distance=$min_distance
                        variable=loc
                        allow_less=yes
                        [command]
                            {VARIABLE loc$j|_x $loc.x}
                            {VARIABLE loc$j|_y $loc.y}
                            {VARIABLE_OP j add 1}
                        [/command]
                    [/random_placement]

                    # if we found two matching locations, use them
                    [if]
                        {VARIABLE_CONDITIONAL loc1_x not_equals $null}
                        {VARIABLE_CONDITIONAL loc1_y not_equals $null}
                        {VARIABLE_CONDITIONAL loc2_x not_equals $null}
                        {VARIABLE_CONDITIONAL loc2_y not_equals $null}
                        [then]
                            {ANIMATE_UNIT id=MiddleEldred pre_teleport}
                            [store_unit]
                                {FILTER id=MiddleEldred}
                                variable=stored_midEldred
                                kill=yes
                            [/store_unit]
                            [redraw][/redraw]
                            {MAKE_MIRROR Mirror1 $loc1_x $loc1_y}
                            {MAKE_MIRROR Mirror2 $loc2_x $loc2_y}
                            {FIRE_EVENT explain_mirrors}
                        [/then]
                    [/if]
                    {VARIABLE_OP i add 1}
                    {VARIABLE min_distance "$( max([ 1, $min_distance-1 ]) )"}
                [/do]
            [/while]
            {CLEAR_VARIABLE i,j,min_distance}
        [/event]

        #############################
        # REVEAL THE REAL ELDRED
        #############################
#define DESTROY_MIRROR MIRROR_ID
    {KILL id={MIRROR_ID} ANIMATE=yes}
    [store_unit]
        {FILTER id=Mirror1,Mirror2}
        variable=remaining_mirror
    [/store_unit]
    [unstore_unit]
        variable=stored_midEldred
        x,y=$remaining_mirror.x,$remaining_mirror.y
    [/unstore_unit]
    {CLEAR_VARIABLE remaining_mirror}
#enddef
        # attacking a target destroy the mirror instantly (the destruction happens before the attack is consumed)
        # AOE effects (i.e. blizzard/cataclysm) also destroy the mirror
        [event]
            name=pre attack
            first_time_only=no
            {FILTER_SECOND id=Mirror1,Mirror2}
            {DESTROY_MIRROR $second_unit.id}
        [/event]
        [event]
            name=slowed_by_blizzard,harmed_by_cataclysm
            first_time_only=no
            {FILTER id=Mirror1,Mirror2}
            {DESTROY_MIRROR $unit.id}
        [/event]
        # if the player doesn't destroy either mirror, auto-destroy Mirror1
        [event]
            name=side 1 turn end
            first_time_only=no
            [filter_condition]
                {HAVE_UNIT id=Mirror1}
            [/filter_condition]
            {DESTROY_MIRROR Mirror1}
        [/event]
    [/event]

    ###########################################################################
    #                                GHOSTS PHASE
    ###########################################################################
    [event]
        name=side 2 turn refresh
        [filter_condition]
            [have_unit]
                id=MiddleEldred
                # relevant for Cataclysm, which reduces Eldred to 1hp without killing him
                formula=(self.hitpoints <= 1)
            [/have_unit]
        [/filter_condition]
        {FIRE_EVENT begin_ghosts}
    [/event]
    [event]
        name=last breath
        {FILTER id=MiddleEldred}
        {MODIFY_UNIT id=MiddleEldred hitpoints 1}
        {FIRE_EVENT begin_ghosts}
    [/event]
    [event]
        name=begin_ghosts
        {VARIABLE is_during_attack yes} # this cutscene is likely a time when Delfador will want to cast spells. Make him wait until the cutscene finishes
        {MODIFY_UNIT id=MiddleEldred hitpoints 1}
        {KILL id=MirrorEldred}
        {MODIFY_UNIT id=Delfador moves 5}
        {MODIFY_UNIT id=Delfador attacks_left 1}
        [message]
            speaker=narrator
            message={MAGIC_ELDRED_MESSAGE _"Give up."}
        [/message]

        #############################
        # TELEPORT TO CENTER
        #############################
        [store_unit]
            {FILTER x,y=24,20}
            kill,variable=yes,blocking_unit
        [/store_unit]
        {IF} {NOT({HAVE_UNIT( id,x,y=MiddleEldred,24,20 )})}{THEN(
            {ANIMATE_UNIT id=MiddleEldred dark_teleport_out}
            {TELEPORT_UNIT id=MiddleEldred 24 20}
            {MODIFY_UNIT id=MiddleEldred facing ne}
            {ANIMATE_UNIT id=MiddleEldred dark_teleport_in}
        )} {/IF}
        {IF} {VARIABLE_CONDITIONAL blocking_unit.length greater_than 0} {THEN(
            [unstore_unit]
                variable,find_vacant=blocking_unit,yes
            [/unstore_unit]
            {CLEAR_VARIABLE blocking_unit}
        )} {/IF}

        {DELAY 500}
        {STORE_UNIT_VAR id=MiddleEldred hitpoints eldred_hp}
        {KILL id=MiddleEldred}
        [unit]
            id=HunkerEldred
            name=_"Eldred"
            type=Hunker Eldred # use a new ID so phase 1 and phase 2 events don't interfere
            side=2
            x,y=24,20
            facing=ne
            profile=portraits/eldred.webp
            hitpoints=$eldred_hp
            [modifications]
                {TRAIT_RESILIENT} {TRAIT_INTELLIGENT}
                [object]{EFFECT overlay add=misc/leader-crown.png}
                [/object]
            [/modifications]
        [/unit]
        {DELAY 500}

        #############################
        # INVULNERABILITY SHIELD
        #############################
        [item]
            x,y,name=24,20,invulnerability_shield
            halo="halo/cataclysm/sphere/[0001~0024].png~O(0.6)~SCALE(100,100)~CROP(0,0,100,80):125"
        [/item]
        [event]
            name=skill_stasis_end
            first_time_only=no
            {FILTER_CONDITION({HAVE_UNIT( id=HunkerEldred )})}
            {FILTER_CONDITION({HAVE_UNIT( type_adv_tree=Ghost )})}
            {MODIFY_UNIT id=HunkerEldred status.petrified no}
        [/event]
        [event]
            name=skill_blizzard_end
            first_time_only=no
            {FILTER_CONDITION({HAVE_UNIT( id=HunkerEldred )})}
            {FILTER_CONDITION({HAVE_UNIT( type_adv_tree=Ghost )})}
            {MODIFY_UNIT id=HunkerEldred status.slowed no}
        [/event]
        [event]
            name=new turn
            first_time_only=no
            {MODIFY_UNIT id=HunkerEldred resting no}
        [/event]

        # force Delfador's (and his familiar's) magical attacks to miss HunkerEldred.
        # HunkerEldred has 100% defense, but "magical" ignores that unless we override that here
        {GIVE_OBJECT_TO () {EFFECT attack (
            [set_specials]
                mode=append
                [chance_to_hit]
                    value=0
                    priority=99
                    [filter_opponent]
                        type="Hunker Eldred"
                    [/filter_opponent]
                [/chance_to_hit]
            [/set_specials]
        )}}

        #############################
        # GHOST HELPER MACRO
        #############################
#define CREATE_GHOST X Y TYPE ID FACE
    {NAMED_UNIT 2 {TYPE} {X} {Y} {ID} "" ()} {ANIMATE} {FACING {FACE}}
    [modify_unit]
        {FILTER id={ID}}
        moves=0
        [object]
            {EFFECT movement set=2}
        [/object]
    [/modify_unit]
    [micro_ai]
        side,action,ai_type=2,add,goto
        ca_id={ID}_goto_mai
        {FILTER id={ID}}
        {FILTER_LOCATION x,y=24,20}
    [/micro_ai]
#enddef
#define CONSUME_GHOST ID
    [micro_ai]
        side,action,ai_type=2,delete,goto
        ca_id={ID}_goto_mai
    [/micro_ai]

    [store_unit]
        {FILTER id={ID}}
        variable=ghost
        kill=yes
    [/store_unit]
    {FAKE_UNIT_MOVE $ghost.x 24 $ghost.y 20  2 $ghost.type ()}
    {CLEAR_VARIABLE ghost}
    # The more hitpoints Eldred has already healed, the fewer he gets from his next ghost
    # Remember that Eldred also has higher max HP on high difficulties
    # This helps make the fight's final phase a little closer and less swingy
    [store_unit]
        {FILTER id=HunkerEldred}
        variable=eldred
    [/store_unit]
    [heal_unit]
        {FILTER id=HunkerEldred}
        animate=yes
        amount="$( ceil( {ON_DIFFICULTY4 30 40 50 60} * (1 - as_decimal($eldred.hitpoints)/as_decimal($eldred.max_hitpoints)) ) )"
    [/heal_unit]
    {CLEAR_VARIABLE eldred,healing}
#enddef

        #############################
        # FIRST GHOST
        #############################
        {CREATE_GHOST 19 24 Ghost ghost0 ne}
        {MOVE_UNIT id=ghost0 23 21}
        [message]
            speaker=narrator
            message={MAGIC_ELDRED_MESSAGE _"Your achievements are undone. Your king is dead. The ghosts of the past will always haunt you, Delfador war-mage."}
        [/message]
        {CONSUME_GHOST ghost0}

        #############################
        # MORE GHOSTS
        #############################
        {CREATE_GHOST 21 14 Ghost  ghost1 se}
        {CREATE_GHOST 29 18 Ghost  ghost2 sw}
        {CREATE_GHOST 32 23 Wraith ghost3 nw}
        {CREATE_GHOST 22 24 Ghost  ghost4 ne}
        {CREATE_GHOST 18 20 Wraith ghost5 se}
        {VARIABLE ghosts_consumed 0}
        {CLEAR_VARIABLE is_during_attack}

        #############################
        # GHOST TIMEOUT
        #############################
        # there may be situations where the player can trap a ghost indefinitely with cheap mudcrawlers, or otherwise bounce ghosts back and forth indefinitely
        # to avoid this, kill ghosts if they're taking too long to reach Eldred
        [event]
            name="turn $( $turn_number + 8 )"
            delayed_variable_substitution=no
            {KILL type_adv_tree=Ghost ANIMATE=yes}
            {FIRE_EVENT check_ghosts_gone}
        [/event]

        #############################
        # CONSUME EACH GHOST
        #############################
        [event]
            name=moveto
            first_time_only=no
            {FILTER( type_adv_tree=Ghost {FILTER_ADJACENT id=HunkerEldred} )}
            {CONSUME_GHOST $unit.id}
            {VARIABLE_OP ghosts_consumed add 1}
            {FIRE_EVENT check_ghosts_gone}
        [/event]

        #############################
        # DELFADOR KILLS GHOST
        #############################
        [event]
            name=die
            first_time_only=no
            {FILTER type_adv_tree=Ghost}
            {FILTER_SECOND side=1}

            # The fewer hitpoints Delfador (or his summon/familiar) has, the more hitpoints he regains from killing a ghost
            # This helps make the fight's final phase a little closer and less swingy
            [store_unit]
                {FILTER id=$second_unit.id}
                variable=delfador
            [/store_unit]
            [heal_unit]
                {FILTER id=$second_unit.id}
                animate=yes
                amount="$( ceil( 20 * (1 - as_decimal($delfador.hitpoints)/as_decimal($delfador.max_hitpoints)) ) )"
            [/heal_unit]
            {CLEAR_VARIABLE delfador,healing}
            {FIRE_EVENT check_ghosts_gone}
        [/event]

        ###########################################################################
        #                                 FINAL PHASE
        ###########################################################################
        [event]
            name=check_ghosts_gone
            {FILTER_CONDITION( {HAVE_UNIT id=HunkerEldred} )}
            {FILTER_CONDITION( {HAVE_UNIT type_adv_tree,count=Ghost,0} )}

            {VARIABLE is_during_attack yes} # this cutscene is likely a time when Delfador will want to cast spells. Make him wait until the cutscene finishes
            {DELAY 500}
            {REMOVE_IMAGE 0-99 0-99}
            {DELAY 500}

            {STORE_UNIT_VAR id=HunkerEldred hitpoints eldred_hp}
            {KILL id=HunkerEldred}
            [unit]
                id=FinalEldred
                name=_"Eldred"
                type=King Eldred # use a new ID so events don't interfere
                side=2
                x,y=24,20
                facing=se
                profile=portraits/eldred.webp
                hitpoints=$eldred_hp
                [modifications]
                    {TRAIT_RESILIENT} {TRAIT_INTELLIGENT}
                    [object]{EFFECT overlay add=misc/leader-crown.png}
                    [/object]
                [/modifications]
            [/unit]
            {MODIFY_UNIT id=FinalEldred moves 5}
            {MODIFY_UNIT id=FinalEldred attacks_left 1}

            {DELAY 500}
            [message]
                speaker=narrator
                message={MAGIC_ELDRED_MESSAGE _"No."}
            [/message]
            {DELAY 500}
            {CLEAR_VARIABLE is_during_attack}

            #############################
            # FINALELDRED GETS TWO TURNS
            #############################
            [modify_side]
                side=3
                color=wesred
            [/modify_side]
            [event]
                name=side 3 turn refresh
                # switch sides after refresh, so we don't get double healing
                first_time_only=no
                {GIVE_OBJECT_TO id=FinalEldred id=eldred_second_turn}
                {DELAY 1000}
                {REMOVE_OBJECT eldred_second_turn ()}
                [modify_unit]
                    {FILTER id=FinalEldred}
                    side=3
                    moves="$( $this_unit.max_moves )"
                    attacks_left=1
                [/modify_unit]
            [/event]
            [event]
                name=side 3 turn end
                first_time_only=no
                {MODIFY_UNIT id=FinalEldred side 2}
            [/event]
        [/event]
    [/event]

    ###########################################################################
    #                              VICTORY / DEFEAT
    ###########################################################################
    [event]
        name=last breath
        {FILTER id=FinalEldred}

        #############################
        # LAST BREATH
        #############################
        {DELAY 500}
        [message]
            speaker=narrator
            message={MAGIC_ELDRED_MESSAGE _"You really still don’t understand, do you?"}
        [/message]
        {STORE_UNIT_VAR id=FinalEldred x eldredX}
        {STORE_UNIT_VAR id=FinalEldred y eldredY}
        {KILL id=FinalEldred}
        [unit]
            id=FinalEldred
            name=_"Eldred"
            type=King Eldred
            side=2
            x,y=$eldredX,$eldredY
            facing=ne
            profile=portraits/eldred.webp
            hitpoints=1
            [modifications]
                {TRAIT_RESILIENT} {TRAIT_INTELLIGENT}
                [object]{EFFECT overlay add=misc/leader-crown.png}
                [/object]
            [/modifications]
        [/unit]
        [message]
            speaker=narrator
            message={MAGIC_ELDRED_MESSAGE _"You had your chance to change fate. Your revelation came too late. The future is already written."}
        [/message]

        {DELAY 500}
        {STORE_UNIT_VAR id=FinalEldred x eldredX}
        {STORE_UNIT_VAR id=FinalEldred y eldredY}
        {KILL id=FinalEldred}
        [unit]
            id=HunkerEldred
            name=_"Eldred"
            type=Hunker Eldred
            side=2
            x,y=$eldredX,$eldredY
            facing=ne
            profile=portraits/eldred.webp
            hitpoints=1
            [modifications]
                {TRAIT_RESILIENT} {TRAIT_INTELLIGENT}
                [object]{EFFECT overlay add=misc/leader-crown.png}
                [/object]
            [/modifications]
        [/unit]
        {DELAY 500}

        [message]
            speaker=narrator
            #po: prophecy callback
            message={MAGIC_ELDRED_MESSAGE _"You have no title, no country, no king. You are a failure. Alone, you are nothing."}
        [/message]

        #############################
        # REPLACE THE MAP
        #############################
        [change_theme]
            theme=Cutscene_Minimal
        [/change_theme]
        {SCREEN_FADER 100,0,0 255 250}
        [replace_map]
            map_file=14c_Long_Live_the_Queen.map
            expand,shrink=yes,yes
        [/replace_map]
        {REMOVE_IMAGE 0-99 0-99}
        [replace_schedule]
            {DEFAULT_SCHEDULE}
        [/replace_schedule]
        [modify_side]
            side,fog=1,no
        [/modify_side]

        #############################
        # RESTORE UNITS
        #############################
        {TELEPORT_UNIT id=HunkerEldred 1 2}
        {TELEPORT_UNIT id=Delfador 1 1}
        {FIRE_EVENT skill_shield_cancel}
        {FIRE_EVENT skill_levitate_cancel}
        {FIRE_EVENT skill_counterspell_cancel}
        {FIRE_EVENT skill_polymorph_stoat_cancel}
        {FIRE_EVENT skill_polymorph_bear_cancel}
        {FIRE_EVENT skill_polymorph_crab_cancel}
        {FIRE_EVENT skill_polymorph_roc_cancel}
        {FIRE_EVENT skill_illusion_cancel}

        [foreach]
            array=stored_units_s13
            [do]
                [unstore_unit]
                    variable=this_item
                    find_vacant=yes
                [/unstore_unit]
            [/do]
        [/foreach]
        {KILL( {FILTER_LOCATION( x,y,radius=24,20,1 )} )}
        {KILL( {FILTER_LOCATION( x,y,radius=25,20,1 )} )}

        {TELEPORT_UNIT id=Delfador     25 20} {MODIFY_UNIT id=Delfador     facing sw}
        {TELEPORT_UNIT id=HunkerEldred 24 20} {MODIFY_UNIT id=HunkerEldred facing ne}

        #############################
        # CUTSCENE
        #############################
        {DELAY 250}
        {SCREEN_FADER 0,0,0 0 250}
        {DELAY 1500}
        [message]
            speaker=Delfador
            message= _ "Nothing? I am Delfador."
        [/message]
        [message]
            speaker=Delfador
            message= _ "And you are dust."
        [/message]
        {SOUND lightning.ogg}
        [item]
            halo=halo/lightning-bolt-2-[1~4].png
            x,y=24,19
        [/item]
        {SCREEN_FADER 255,255,255 255 250}
        {FADE_MUSIC_OUT 4000}
        {SCREEN_FADER 000,000,000 255 5000}
        {REPLACE_SCENARIO_MUSIC silence.ogg}
        {FADE_MUSIC_IN 100}
        {DELAY 500}

        #############################
        # EPILOGUE
        #############################
        [message]
            speaker,image=narrator,wesnoth-icon.png
            #po: 13 kings is made-up, because 13 is an unlucky number. 12 non-Eldred kings across 500 years makes for an average 42 year reign
            #po: given Wesnoth's access to magical healing, a 42-year reign average seems plausible, if rather high.
            message=_"Thus perishes Eldred, thirteenth king of Wesnoth.

With him ends the story of the sons of Haldric; that unbroken line of kings stretching five hundred years back to the Green Isle itself."
        [/message]
        [message]
            speaker,image=narrator,wesnoth-icon.png
            message=_"The exhausted Delfador fights valiantly against Eldred’s — now Asheviere’s — army, but reinforcements from Weldyn eventually repulse the beleaguered rebels. Neither side wins a decisive military victory."
        [/message]
        [message]
            speaker,image=narrator,wesnoth-icon.png
            message=_"As word spreads of the kings’ deaths, a terrible foreboding seems to settle over the Wesnothian countryside."
        [/message]
        [message]
            speaker,image=narrator,wesnoth-icon.png
            message=_"After all, the civil war has only just begun..."
        [/message]

        #############################
        # CLEANUP
        #############################
        [volume]
            music=100
        [/volume]
        [endlevel]
            result=victory
            linger_mode,carryover_report=no,no
        [/endlevel]
    [/event]

    {HERODEATHS}
[/scenario]

#undef TURNS
#undef ENRAGE_IF_NO_KEEP
#undef ELDRED_SIDE
#undef MAGIC_ELDRED_MESSAGE
