                id=Delfador
                extra_recruit={DELFADOR_MIDDLE_RECRUIT},{DELFADOR_BANDIT_RECRUIT},Poacher,{DELFADOR_CAVALRY_RECRUIT}
            [/set_extra_recruit]
        )} {ELSE(
            [set_extra_recruit]
                id=Delfador
                extra_recruit={DELFADOR_MIDDLE_RECRUIT},{DELFADOR_BANDIT_RECRUIT},{DELFADOR_CAVALRY_RECRUIT}
