#textdomain wesnoth-tdg

#
# Eldred has middling gold but very high income.
# Beacuse most of his leaders are on one side, you can't whittle down his income leader-by-leader,
# and because he has a lot of upkeep from all his guards, taking ground / killing guards only serves to boost his income further
#
# The best strategy is usually to rush Eldred down before his income can showball out of control,
# which also fits with with the story: Delfador kills Eldred, but is forced to retreat
#
# Note that Delfador's starting area has a huge number of villages.
# Holding these villages will let Delfador continuously recruit and/or compensate for poor carryover last scenario,
# while also denying that upkeep/income to Eldred and his allies
#

[scenario]
    id=14_Long_Live_the_Queen
    map_file=14_Long_Live_the_Queen.map
    name=_"Long Live the Queen"
    victory_when_enemies_defeated=no
    {DEFAULT_SCHEDULE} turns=-1
    {SCENARIO_MUSIC loyalists.ogg}
    {EXTRA_SCENARIO_MUSIC vengeful.ogg}
    {EXTRA_SCENARIO_MUSIC the_city_falls.ogg}

    {DE_TRACK {JOURNEY_13_NEW}}

    ###########################################################################
    #                                  DEFINE SIDES
    ###########################################################################
    #############################
    # DELFADOR
    #############################
    [side]
        side,controller,color=1,human,red
        id,defeat_condition,gold=Delfador,never,0
        team_name=delfador
        user_team_name=_"Delfador’s Rebels"
        {FLAG_VARIANT loyalist}
    [/side]
    {STARTING_VILLAGES_AREA 1 45 1 5}
    {STARTING_VILLAGES_AREA 1 51 2 5}

    #############################
    # ELDRED
    #############################
    [side]
        side=2
        controller=ai
        color=wesred

        {SINGLEUNITWML_ELDRED}
        x,y=24,20
        facing=se

        gold={ON_DIFFICULTY4 0 0 0 0}
        income={ON_DIFFICULTY4 18 38 58 78}
        recruit= # individual leaders get their own recruit list

        team_name=eldred
        user_team_name=_"Army of Wesnoth"
        {FLAG_VARIANT6 ragged}
    [/side]
    {STARTING_VILLAGES_AREA 2 1-30 12-99 0}
    {STARTING_VILLAGES_AREA 2 1-99 20-99 0}
    # don't limit leader moves. Eldred's moves are micromanaged with a MAI,
    # and it's fine if his other leader run out and die - they're expendable

    #--------------------
    # ELDRED LEADERS
    #--------------------
    [event]
        name=prestart
        {GIVE_OBJECT_TO id=Eldred ({EFFECT overlay remove=misc/hero-icon.png})}
        [unit]
            {SINGLEUNITWML_KESTREL}
            side,x,y,facing=2,27,21,se
            canrecruit=yes
        [/unit]

#define ELDRED_LEADER TYPE X Y EXTRA_RECRUIT TRAITS
    [unit]
        side=2
        type={TYPE}
        extra_recruit={EXTRA_RECRUIT}
        x,y={X},{Y}
        canrecruit=yes
        {MODIFICATIONS({TRAITS})}
    [/unit]
#enddef
        {ELDRED_LEADER "Iron Mauler"    33 21 "Heavy Infantryman"  ({TRAIT_STRONG}     {TRAIT_QUICK}    )}
        {ELDRED_LEADER "Javelineer"     21 19 "Javelineer"         ({TRAIT_STRONG}     {TRAIT_RESILIENT})}

        {ELDRED_LEADER "Swordsman"      56 24 "Spearman,Swordsman" ({TRAIT_STRONG}     {TRAIT_RESILIENT})}
        {ELDRED_LEADER "Master at Arms" 50 23 "Fencer,Duelist"     ({TRAIT_RESILIENT}  {TRAIT_STRONG}   )}
        {ELDRED_LEADER "Lieutenant"     42 20 "Bowman,Longbowman"  ({TRAIT_INTELLIGENT}{TRAIT_RESILIENT})}

        {ELDRED_LEADER "Lieutenant"     14 13 "Spearman,Swordsman" ({TRAIT_RESILIENT}  {TRAIT_STRONG}   )}
        {ELDRED_LEADER "Silver Mage"     8 11 "Mage,Red Mage"      ({TRAIT_QUICK}      {TRAIT_RESILIENT})}
        {ELDRED_LEADER "Master Bowman"   3  9 "Bowman,Longbowman"  ({TRAIT_INTELLIGENT}{TRAIT_RESILIENT})}
    [/event]

    #############################
    # ELDRED AI
    #############################
    [event]
        name=side 2 turn
        first_time_only=no
        {RESET_SIDE_AI 2 defensive 0.8 0.25}
        {VARY_AI_BY_SCHEDULE_ENEMY_NIGHTTIME 2 1}
        {LEADER_BODYGUARD 2 Eldred x,y=24,20 (
            [value]
                x,y=25,22
            [/value]
            [value]
                x,y=25,21
            [/value]
            [value]
                x,y=24,21
            [/value]
            [value]
                x,y=23,21
            [/value]
            [value]
                x,y=23,20
            [/value]
            [value]
                x,y=24,19
            [/value]
            [value]
                x,y=25,20
            [/value]
        )}
    [/event]

    #############################
    # TOWN
    #############################
    [side]
        side=3
        controller=ai
        color=blue
        x,y=39,11
        type=Longbowman
        {MODIFICATIONS({TRAIT_RESILIENT}{TRAIT_STRONG})}
        gold={ON_DIFFICULTY4 25 50 75 100}
        income={ON_DIFFICULTY4 0 0 0 0}
        recruit=Spearman
        team_name=eldred
        user_team_name=_"Army of Wesnoth"
        {FLAG_VARIANT6 ragged}
    [/side]
    {LIMIT_CONTEMPORANEOUS_RECRUITS 3 "Bowman" {ON_DIFFICULTY4 1 2 3 3}} # 1 guard on Normal/Hard/Deadly
    {STARTING_VILLAGES_AREA 3 36 12 5}
    {SILENTLY_LIMIT_LEADER_MOVES 3 2}

    #############################
    # ORCS
    #############################
    [side]
        side=4
        controller=ai
        color=orange
        type=Orcish Slurbow
        {MODIFICATIONS( {TRAIT_RESILIENT}{TRAIT_STRONG} )}
        x,y=50,15
        facing=ne
        gold={ON_DIFFICULTY4 25 50 75 100}
        income={ON_DIFFICULTY4 0 0 0 0}
        recruit=Orcish Archer
        team_name=eldred
        user_team_name=_"Foxtail Outriders"
        {FLAG_VARIANT6 ragged}
    [/side]
    {SILENTLY_LIMIT_LEADER_MOVES 4 1}
    {LIMIT_CONTEMPORANEOUS_RECRUITS 4 "Goblin Pillager" {ON_DIFFICULTY4 0 1 3 3}} # 1 guard on Hard/Nightmare
    {STARTING_VILLAGES_AREA 4 51 13 0}

    [side]
        side=5
        controller=ai
        color=black
        type=Orcish Warlord
        {MODIFICATIONS( {TRAIT_RESILIENT}{TRAIT_STRONG} )}
        x,y=17,6
        facing=se
        gold={ON_DIFFICULTY4 25 50 75 100}
        income={ON_DIFFICULTY4 0 0 0 0}
        recruit=Orcish Adept
        team_name=eldred
        user_team_name=_"Blackcrest Outriders"
        {FLAG_VARIANT6 ragged}
    [/side]
    [event]
        name=prestart
        [unit]
            side=5
            x,y=11,3
            facing=se
            type=Orcish Slayer
            canrecruit=yes
        [/unit]
    [/event]
    {SILENTLY_LIMIT_LEADER_MOVES 5 1}
    {LIMIT_CONTEMPORANEOUS_RECRUITS 5 "Orcish Assassin" {ON_DIFFICULTY4 0 1 2 2}}
    {LIMIT_CONTEMPORANEOUS_RECRUITS 5 "Orcish Grunt"    {ON_DIFFICULTY4 1 2 3 3}}
    {STARTING_VILLAGES_AREA 5 14 3 3}

    [event]
        name=side 4 turn
        first_time_only=no
        {RESET_SIDE_AI 4,5 offensive 0.8 0.25} # orcs just rush in, in orc-y fashion
        {VARY_AI_BY_SCHEDULE 4,5}
    [/event]

    # if Delfador destroys a leader's keep with Cataclysm, remove their leader status so they charge in and attack
#define ENRAGE_IF_NO_KEEP SIDE
    {IF} {NOT({HAVE_UNIT( side={SIDE} {FILTER_LOCATION(radius,terrain=4,K*^*)} )})} {THEN(
        {GIVE_OBJECT_TO side,canrecruit={SIDE},yes ({EFFECT overlay add=misc/leader-crown.png})}
        {MODIFY_UNIT side,canrecruit={SIDE},yes canrecruit no}
        [remove_event]
            id=limit_moves_leader{SIDE}
        [/remove_event]
    )} {/IF}
#enddef
    [event]
        name,first_time_only=side 1 turn end,no
        {ENRAGE_IF_NO_KEEP 7}
        {ENRAGE_IF_NO_KEEP 9}
        {ENRAGE_IF_NO_KEEP 10}
    [/event]

