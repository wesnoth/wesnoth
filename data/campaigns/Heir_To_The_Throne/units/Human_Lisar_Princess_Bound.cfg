#textdomain wesnoth-h2tt
[unit_type]
    id=Bound Princess
    name= _ "female^Bound Princess"
    gender=female
    race=human
    num_traits=0
    image="units/lisar/human-princess-unarmed.png"
    {DEFENSE_ANIM "units/lisar/human-princess-unarmed.png" "units/lisar/human-princess-unarmed.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
    hitpoints=75
    # similar movement/resistances as the General
    movement_type=smallfoot
    [resistance]
        blade=90
        pierce=90
        impact=90
    [/resistance]
    movement=6
    experience=160
    level=3
    alignment=lawful
    advances_to=null
    {AMLA_DEFAULT}
    cost=999 # needs to be high enough that enemies will attack Lisar. It makes sense for them to prioritize her, since she's helpless
    [abilities]
        {ABILITY_LEADERSHIP}
        {ABILITY_EXACTING}
    [/abilities]
    usage=fighter
    description= _ "Asheviere’s fearless princess now marches in chains, a prisoner of Konrad and his rebels."
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
[/unit_type]
