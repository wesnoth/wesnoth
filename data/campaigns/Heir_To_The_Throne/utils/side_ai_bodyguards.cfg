#textdomain wesnoth-h2tt

#define LEADER_BODYGUARD SIDE LEADER_ID KEEP_LOCATION RETREAT_LOCATIONS
    #############################
    # PERSONAL LEADER AI
    #############################
    # the player has access to many powerful individual units, especially Konrad with skirmisher and the Sceptre
    # to prevent a single unit from bypassing our leader's army and assassinating them, micromanage their movements
    # and try to ensure they're always surrounded by a full ring of 6 bodyguards
    #
    # this behavior is especially important for S50 (since that's the finale) and is calibrated around it,
    # but is also helpful for other scenarios where Konrad can win by easily assassinating a leader

    #------------------------
    # ACTIVATE BODYGUARD AI
    #------------------------
    # if any enemy unit could get close to our leader (ignoring ZoC), activate the bodyguard AI
    [store_reachable_locations]
        [filter]
            side=1,$lisar_side
        [/filter]
        [filter_location]
            {FILTER id={LEADER_ID}}
        [/filter_location]
        range=vision # check the attacker's vision range - vision is the same as attack, but ignores ZoC
        variable=threat_reaches_leader
    [/store_reachable_locations]
    [if]
        {VARIABLE_CONDITIONAL threat_reaches_leader.length greater_than 0}
        [then]
            #------------------------
            # SET LEADER GOAL
            #------------------------
            # check several possible locations, in order. Pick the first one in the list that doesn't have any adjacent enemies
            [set_variables]
                name=possible_goals
                [value]
                    # default to our keep location
                    {KEEP_LOCATION}
                [/value]
                {RETREAT_LOCATIONS}
                [value]
                    # this is our fallback goal. If all options are bad, just sit on our keep and die
                    skip_checks=yes
                    {KEEP_LOCATION}
                [/value]
            [/set_variables]
            [foreach]
                array=possible_goals
                variable=goal
                [do]
                    #------------------------
                    # SKIP BAD GOALS
                    #------------------------
                    # skip goals that have adjacent enemy units
                    # don't worry about healing at villages - if we've been injured already, we're probably going to die soon anyway
                    [if]
                        {VARIABLE_CONDITIONAL goal.skip_checks not_equals yes}
                        [have_unit]
                            side=1,$lisar_side
                            {FILTER_LOCATION x,y,radius=$goal.x,$goal.y,1}
                        [/have_unit]
                        [then]
                            [continue][/continue]
                        [/then]
                    [/if]
                    {VARIABLE goalX $goal.x}
                    {VARIABLE goalY $goal.y}

                    #------------------------
                    # CREATE MAI
                    #------------------------
                    # if we've successfully picked a goal, delete our old MAI and create a new one
                    {DELETE_MAI {SIDE} messenger_escort leader_personal_goal}
                    [micro_ai]
                        side={SIDE}
                        action=add
                        ai_type=messenger_escort
                        ca_id=leader_personal_goal
                        id={LEADER_ID}
                        [filter_second]
                            role=bodyguard
                        [/filter_second]
                        enemy_death_chance=1 # leader only attacks with 100% odds - i.e. never
                        waypoint_x,waypoint_y=$goalX,$goalY
                        ca_score=900000 # higher than the bodyguards' default ZONE_GUARDIANs
                    [/micro_ai]
                    # if another unit is blocking our goal, include it in the MAI so the MAI can handle moving it out of our way
                    {MODIFY_UNIT(
                        x,y=$goalX,$goalY
                        {NOT id={LEADER_ID}}
                    ) role bodyguard}
                    [break][/break]
                [/do]
            [/foreach]
            {CLEAR_VARIABLE possible_goals}

            #------------------------
            # SELECT REPLACEMENT BODYGUARDS
            #------------------------
            # assign up to 6 high-hp bodyguards (more if our leader is injured)
            [store_unit]
                [filter]
                    role=bodyguard
                    formula=(self.hitpoints >= 30)
                [/filter]
                variable=healthy_bodyguards
            [/store_unit]

            {VARIABLE radius 1}
            {VARIABLE bodyguard_target 6}
            [if]
                [have_unit]
                    id={LEADER_ID}
                    formula=(self.hitpoints < self.max_hitpoints)
                [/have_unit]
                [then]
                    {VARIABLE_OP bodyguard_target add {ON_DIFFICULTY4 0 3 6 6}}
                [/then]
            [/if]
            [while]
                {VARIABLE_CONDITIONAL healthy_bodyguards.length less_than $bodyguard_target}
                [do]
                    [store_unit]
                        [filter]
                            [filter_side]
                                [allied_with]
                                    side={SIDE}
                                [/allied_with]
                            [/filter_side]
                            formula=(self.hitpoints >= 30)
                            canrecruit=no
                            {NOT trait=loyal}
                            {NOT role=bodyguard}
                            {NOT type_adv_tree="Gryphon Rider"} # for S50: they have their own AI, and they're poor bodyguards anyway
                            {NOT id=bridgeGuardSE,bridgeGuardNE,bridgeGuardN,bridgeGuardNW,bridgeGuardSW,bridgeGuardS} # for S50: they have their own role
                            [filter_location]
                                [and]
                                    x,y=$goalX,$goalY
                                    radius=$radius
                                [/and]
                                [not]
                                    x,y=$goalX,$goalY
                                    radius="$( $radius-1 )" # for performance, don't search areas we've already searched
                                [/not]
                            [/filter_location]
                        [/filter]
                        variable=candidates
                    [/store_unit]
                    [foreach]
                        array=candidates
                        variable=candidate
                        [do]
                            [store_reachable_locations]
                                {FILTER id=$candidate.id}
                                {FILTER_LOCATION x,y=$goalX,$goalY}
                                moves=max
                                variable=reachable
                            [/store_reachable_locations]
                            [if]
                                {VARIABLE_CONDITIONAL reachable.length greater_than 0}
                                [then]
                                    {MODIFY_UNIT id=$candidate.id role bodyguard}
                                    {MODIFY_UNIT id=$candidate.id side {SIDE}} # if we were formerly on another side, steal the unit for this side, otherwise our bodyguard MAIs won't work
                                    [store_unit]
                                        {FILTER id=$candidate.id}
                                        variable=healthy_bodyguards
                                        mode=append
                                    [/store_unit]
                                    {IF_VAR healthy_bodyguards.length greater_than_equal_to $bodyguard_target (
                                        [then]
                                            [break][/break]
                                        [/then]
                                    )}
                                [/then]
                            [/if]
                        [/do]
                    [/foreach]
                    # if we didn't find a bodyguard, expand our search radius
                    {VARIABLE_OP radius add 1}
                    {IF_VAR radius greater_than 8 (
                        [then]
                            [break][/break]
                        [/then]
                    )}
                [/do]
            [/while]
            {CLEAR_VARIABLE goalX,goalY,healthy_bodyguards,reachable,bodyguard_target}
        [/then]
    [/if]
    {CLEAR_VARIABLE threat_reaches_leader}
#enddef
