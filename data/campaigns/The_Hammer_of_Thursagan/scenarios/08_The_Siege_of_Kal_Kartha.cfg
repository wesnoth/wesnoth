#textdomain wesnoth-thot

[scenario]
    id=08_The_Siege_of_Kal_Kartha
    name= _ "The Siege of Kal Kartha"
    map_file=08_The_Siege_of_Kal_Kartha.map
    turns=30
    # lots of villages, and lots of turns. Early finish bonus is less imbalancing here, since the next scenario ignores gold (The Court of Karrag)
    # lots of villages helps with comebacks - if you have few veterans, you'll incur much less upkeep and can recruit more newbies
    next_scenario=09_The_Court_of_Karrag
    victory_when_enemies_defeated=yes
    {DEFAULT_SCHEDULE_SECOND_WATCH}

    {SCENARIO_MUSIC       the_dangerous_symphony.ogg}
    {EXTRA_SCENARIO_MUSIC frantic.ogg}
    {EXTRA_SCENARIO_MUSIC northerners.ogg}

    {THOT_TRACK {JOURNEY_STAGE8}}

    ###########################################################################
    #                                  DEFINE SIDES
    ###########################################################################
    {PLAYER_SIDE}

    #############################
    # ORCS
    #############################
#define ORC_SIDE SIDE TYPE TRAITS RECRUITS
    [side]
        side={SIDE}
        color=green
        controller=ai
        id=leader{SIDE}
        type={TYPE}
        {MODIFICATIONS( {TRAITS} )}
        recruit={RECRUITS}
        gold={ON_DIFFICULTY4 50 100 150 200}
        income={ON_DIFFICULTY4 -2 3 8 13} # expect ~3 villages per orc. On low difficulties, that more than covers upkeep. On high difficulties not so much
        team_name=orcs                    # income gets increased once any leader dies, so make sure those numbers stay consistent with these numbers
        #po: this is the same clan name as the orcs who you fought in S01, helping to explain how the cloak-pin made it all the way to Knalga. "Withervein" refers to poison.
        user_team_name= _ "Clan Withervein"
        {FLAG_VARIANT knalgan}
        facing=sw

        {REGROUP_MAI_DEFAULTS retreat_tod=daytime}
    [/side]
#enddef
    {ORC_SIDE 2 "Direwolf Rider"    ({TRAIT_RESILIENT}  {TRAIT_STRONG}   ) "Goblin Knight,Goblin Pillager"}
    {LIMIT_CONTEMPORANEOUS_RECRUITS 2 "Wolf Rider"         {ON_DIFFICULTY4 0 1 1 2}}
    {LIMIT_CONTEMPORANEOUS_RECRUITS 2 "Goblin Spearman"    {ON_DIFFICULTY4 1 2 3 3}}
    {STARTING_VILLAGES 2 9}

    {ORC_SIDE 3 "Orcish Warlord"    ({TRAIT_STRONG}     {TRAIT_RESILIENT}) "Orcish Grunt,Orcish Archer"   }
    {LIMIT_CONTEMPORANEOUS_RECRUITS 3 "Orcish Warrior"     {ON_DIFFICULTY4 1 1 2 2}}
    {LIMIT_CONTEMPORANEOUS_RECRUITS 3 "Orcish Crossbowman" {ON_DIFFICULTY4 0 1 1 2}}
    {STARTING_VILLAGES 3 9}

    {ORC_SIDE 4 "Orcish Warlord"    ({TRAIT_INTELLIGENT}{TRAIT_STRONG}   ) "Orcish Grunt,Orcish Archer"   }
    {LIMIT_CONTEMPORANEOUS_RECRUITS 4 "Orcish Warrior"     {ON_DIFFICULTY4 1 1 2 2}}
    {LIMIT_CONTEMPORANEOUS_RECRUITS 4 "Orcish Crossbowman" {ON_DIFFICULTY4 0 1 1 2}}
    {LIMIT_CONTEMPORANEOUS_RECRUITS 4 "Orcish Slayer"      {ON_DIFFICULTY4 0 1 1 2}}
    {LIMIT_CONTEMPORANEOUS_RECRUITS 4 "Goblin Spearman"    {ON_DIFFICULTY4 1 2 3 3}}
    {STARTING_VILLAGES 4 9}

    {ORC_SIDE 5 "Orcish Nightblade" ({TRAIT_INTELLIGENT}{TRAIT_RESILIENT}) "Orcish Grunt,Orcish Assassin" }
    {LIMIT_CONTEMPORANEOUS_RECRUITS 5 "Orcish Slayer"      {ON_DIFFICULTY4 0 1 1 2}}
    {LIMIT_CONTEMPORANEOUS_RECRUITS 5 "Goblin Spearman"    {ON_DIFFICULTY4 1 2 3 3}}
    {STARTING_VILLAGES_AREA 5 1-25 14-21 0}

    # initially, strongly prefer attacking Dultatulos (value=1 works out to be pretty strong)
    # this establishes the orcs as a credible threat, and prevents us from overwhelming the player with all our initial gold
    # later, switch to default AI, so we don't abandon our leaders while the player kills them
    [event]
        name=prestart
        # not the side nearest the player
        {MODIFY_AI_ADD_GOAL 2,3,4 (
            [goal]
                [criteria]
                    id=Dulcatulos
                [/criteria]
                value=1
                id=orcs_seek_Dulcatulos
            [/goal]
        )}
    [/event]
    [event]
        name=turn 7
        # leave side 3 focusing on Kal Kartha, since they're closest
        {MODIFY_AI_DELETE_GOAL 2,4 orcs_seek_Dulcatulos}
    [/event]

    #############################
    # KAL KARTHA
    #############################
    [side]
        side=6
        controller=ai
        color=purple # same color as the masked Dwarves from "fear" - a subtle hint
        recruit=Dwarvish Steelclad,Dwarvish Thunderguard
        gold={ON_DIFFICULTY4 50 75 100 125}
        income={ON_DIFFICULTY4 -2 3 8 13}
        team_name=northern_alliance
        user_team_name= _ "Kal Kartha"
        {FLAG_VARIANT knalgan}

        {CHARACTER_STATS_DULCATULOS_AS_LEADER}
        facing=sw

        {REGROUP_MAI_DEFAULTS retreat_tod=nighttime}
        [+ai]
            [avoid]
                [not]
                    terrain=Hh*^*,M*^*,C*^*,K*^*,*^V*,U*^*
                [/not]
            [/avoid]
        [/ai]
    [/side]
    {STARTING_VILLAGES 6 10}
    {SILENTLY_LIMIT_LEADER_MOVES 6 0}

    ###########################################################################
    #                                  PREPARE MAP
    ###########################################################################
    [event]
        name=prestart
        {SET_LABEL 37 2 _"West Gate"}
        {ADD_MULTIHEX_WIND x,y=1-40,1-28 "~FL()"}

        #############################
        # ORCISH GUARDS
        #############################
        {GENERIC_UNITC 2 ({ON_DIFFICULTY4 "Wolf Rider"      "Goblin Pillager" "Goblin Pillager" "Goblin Pillager"   })  35 25  ({FACING nw}{ROLE mai_guard})}
        {GENERIC_UNITC 2 ({ON_DIFFICULTY4 "none"            "none"            "Wolf Rider"      "Goblin Knight"     })  36 20  ({FACING sw}{ROLE mai_guard})}

        {GENERIC_UNITC 3 ({ON_DIFFICULTY4 "Goblin Spearman" "Orcish Grunt"    "Orcish Grunt"    "Orcish Warrior"    })  20 12  ({FACING ne}{ROLE mai_guard})}
        {GENERIC_UNITC 3 ({ON_DIFFICULTY4 "none"            "Goblin Spearman" "Orcish Grunt"    "Orcish Grunt"      })  24 13  ({FACING ne}{ROLE mai_guard})}

        {GENERIC_UNITC 4 ({ON_DIFFICULTY4 "Orcish Archer"   "Orcish Archer"   "Orcish Archer"   "Orcish Crossbowman"})  10  7  ({FACING sw}{ROLE mai_guard})}
        {GENERIC_UNITC 4 ({ON_DIFFICULTY4 "none"            "Goblin Spearman" "Orcish Grunt"    "Orcish Grunt"      })  13 10  ({FACING nw}{ROLE mai_guard})}

        {GENERIC_UNITC 5 ({ON_DIFFICULTY4 "Goblin Spearman" "Orcish Assassin" "Orcish Assassin" "Orcish Assassin"   })  14 14  ({FACING sw}{ROLE mai_guard})}
        {GENERIC_UNITC 5 ({ON_DIFFICULTY4 "none"            "none"            "Goblin Spearman" "Orcish Grunt"      })  15 15  ({FACING nw}{ROLE mai_guard})}

        # and a few attackers so we have some early action
        {GENERIC_UNITC 3 ({ON_DIFFICULTY4 "Orcish Grunt"    "Orcish Grunt"    "Orcish Grunt"    "Orcish Grunt"      }) 25  8 ({FACING ne})}
        {GENERIC_UNITC 3 ({ON_DIFFICULTY4 "Orcish Grunt"    "Orcish Grunt"    "Orcish Grunt"    "Orcish Warrior"    }) 27 10 ({FACING nw})}
        {GENERIC_UNITC 3 ({ON_DIFFICULTY4 "none"            "Orcish Archer"   "Orcish Archer"   "Orcish Crossbowman"}) 26 10 ({FACING nw})}

        #############################
        # KAL KARTHAN GUARDS
        #############################
        {GENERIC_UNITC 2 "Dwarvish Stalwart"  26  6  ({FACING sw}{ZONE_GUARDIAN 26  6 x,y,radius=26,6,1})}
        {GENERIC_UNITC 2 "Dwarvish Stalwart"  36  8  ({FACING se}{ZONE_GUARDIAN 36  8 x,y,radius=36,8,1})}
        {GENERIC_UNITC 6 "Dwarvish Steelclad" 31  5  ({FACING nw}{ZONE_GUARDIAN 31  5 x,y,radius=31,5,1}{ROLE fallback_guard})}
        {LOYAL_UNITC   6 "Dwarvish Stalwart"  35  2  ({FACING sw}{ZONE_GUARDIAN 35  2 x,y,radius=35,2,1}{ROLE fallback_guard})}
        {LOYAL_UNITC   6 "Dwarvish Stalwart"  40  4  ({FACING sw}{ZONE_GUARDIAN 40  4 x,y,radius=39,4,2}{ROLE fallback_guard})}
#ifndef EASY
        {GENERIC_UNIT 6 "Dwarvish Fighter"   34 4}
        {GENERIC_UNIT 6 "Dwarvish Fighter"   34 4}
        {GENERIC_UNIT 6 "Dwarvish Thunderer" 34 4}
#ifdef HARD
        {GENERIC_UNIT 6 "Dwarvish Fighter"   28 4}
        {GENERIC_UNIT 6 "Dwarvish Thunderer" 28 4}
#endif
#endif

        #############################
        # KNALGANS
        #############################
        {RECALL_XY Angarthing 6 27}
        # this macro recalls veterans, or creates new units if we don't have many veterans
        # this helps players "catch up" if they lost of a lot of veterans in Fear or Forbidden Forest
        {RECALL_VETERAN 0-3 "Dwarvish Lord"         9 27}
        {RECALL_VETERAN 0-5 "Dwarvish Thunderguard" 6 28}
        {RECALL_VETERAN 0-7 "Dwarvish Steelclad"   10 27}
        {MODIFY_UNIT side=1 facing ne}
    [/event]

    ###########################################################################
    #                              PLAY SCENARIO
    ###########################################################################
    [event]
        name=start
        [message]
            speaker=Angarthing
            #po: Angarthing specifies that Kal Kartha has many entrances. This helps explain how the Fear dwarves managed to leave while the West Gate was under siege.
            message= _ "Behold! The West Gate of Kal Kartha! The largest of their many doors."
        [/message]
        {SCROLL_TO 40 1}
        [message]
            speaker=Aiglondur
            scroll=no
            message= _ "And under siege, as we feared — by orcs. But we are not too late! The defenders yet hold."
        [/message]
        [message]
            speaker=leader3
            message= _ "Ahhh... more stinky-midgets, come to get killed just like these cowards in their den."
        [/message]
        [message]
            speaker=Aiglondur
            message= _ "There is a mighty host between us and our kin. Let us bring them that orc’s head as a guesting-gift!"
        [/message]
        #############################
        # OBJECTIVES
        #############################
        [objectives]
            [objective]
                description= _ "Defeat any three orcish leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aiglondur or Angarthing"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Dulcatulos"
                condition=lose
            [/objective]
            {TURNS_RUN_OUT}
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]

    #############################
    # DULCATULOS ATTACKS
    #############################
    # if orcs are getting close to the gate, give Dulcatulos some extra gold
    [event]
        name=die
        [filter]
            role=fallback_guard
        [/filter]
        [event]
            name=side 6 turn
            # wait until we're actually weak to trigger this event
            [filter_condition]
                [have_unit]
                    side=6
                    count=0-{ON_DIFFICULTY4 4 5 6 7}
                [/have_unit]
                [have_unit]
                    side=2,3,4,5
                    x,y=28-99,1-7
                    count=0-{ON_DIFFICULTY4 4 5 6 7}
                [/have_unit]
            [/filter_condition]
            [gold]
                amount={ON_DIFFICULTY4 50 75 100 125}
                side=6
            [/gold]
            [message]
                speaker=Dulcatulos
                message= _ "Kal Kartha shall not fall!"
            [/message]
        [/event]
    [/event]

    ###########################################################################
    #                              VICTORY / DEFEAT
    ###########################################################################
    #############################
    # DULCATULOS DIES
    #############################
    [event]
        name=die
        [filter]
            id=Dulcatulos
        [/filter]
        [message]
            speaker=Aiglondur
            message= _ "Kal Kartha is taken. Our mission has failed."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    #############################
    # SECOND ORC LEADER DIES
    #############################
    # wmllint: deathcheck off
    [event]
        name=die
        [filter]
            side=2,3,4,5
            canrecruit=yes
        [/filter]
        [message]
            side=2,3,4,5
            canrecruit=yes
            formula=( self.hitpoints>0 )
            message=_"Useless grunts! We should have taken the gate weeks ago! Fight harder!"
        [/message]
        [gold]
            amount={ON_DIFFICULTY4 20 20 30 40}
            side=2,3,4,5
        [/gold]
        [modify_side]
            side=2,3,4,5
            income={ON_DIFFICULTY4 0 8 13 18}
        [/modify_side]
        [message]
            speaker=Ratheln
            message=_"I think they’ve been reinforced. I really don’t like orcs."
        [/message]
    [/event]
    # wmllint: deathcheck on

    #############################
    # ORC LEADERS DIE
    #############################
    # wmllint: deathcheck off
    [event]
        name=die
        [filter]
            side=2,3,4,5
            canrecruit=yes
        [/filter]
        [filter_condition]
            [have_unit]
                side=2,3,4,5
                canrecruit=yes
                count=0-1
            [/have_unit]
        [/filter_condition]

        #--------------------
        # ORCS FLEE
        #--------------------
        [message]
            side=2,3,4,5
            canrecruit=yes
            formula=( self.hitpoints>0 )
            message=_"Grr... nasty stinky-midgets. We know what you’re up to in there. We’ll be back."
        [/message]
        {CUTSCENE_ENEMIES_RETREAT 2  40 "$($this_item.y)"}
        {CUTSCENE_ENEMIES_RETREAT 3  40 "$($this_item.y)"}
        {CUTSCENE_ENEMIES_RETREAT 4  "$($this_item.x)" 1}
        {KILL side=5}

        #--------------------
        # DULCATULOS SPEAKS
        #--------------------
        {MOVE_UNIT id=Dulcatulos 36 3}
        {MOVE_UNIT id=Dulcatulos 36 4}
        [message]
            speaker=Dulcatulos
            message=_"Hail, fellow dwarves! Well fought, and our thanks; we were sorely pressed."
        [/message]
        [message]
            speaker=Dulcatulos
            message=_"I had not expected to find allies so far from peopled lands. From whence do you hail?"
        [/message]
        [message]
            speaker=Aiglondur
            message= _ "We come at the behest of Hamel, Lord of Knalga and Lord Companion of the Northern Alliance. We seek audience with your lord."
        [/message]
        [message]
            speaker=Dulcatulos
            message=_"You are our honored guests, and I will show you to the best quarters we have myself. Then I must see to my troop’s care. Lord Karrag will have speech with you on the morrow."
        [/message]

        [endlevel]
            result=victory
            bonus=yes
            {NEW_GOLD_CARRYOVER 40}
        [/endlevel]
    [/event]
    # wmllint: deathcheck on

    {HERODEATH_AIGLONDUR}
    {HERODEATH_ANGARTHING}
    {HERODEATH_RATHELN}
[/scenario]

#undef ORC_SIDE
