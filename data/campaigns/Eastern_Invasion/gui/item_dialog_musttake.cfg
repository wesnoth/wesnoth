#textdomain wesnoth-ei

[resolution]
    definition="menu"
    [helptip]
        id="tooltip_large"
    [/helptip]
    [tooltip]
        id="tooltip_large"
    [/tooltip]
    maximum_width = 520
    [grid]
        [row]
            [column]
                [image]
                    label="icons/banner3.png"
                [/image]
            [/column]
        [/row]
        [row]
            [column]
                horizontal_alignment = "center"
                grow_factor = 1
                border = "all"
                border_size = 5
                [label]
                    definition = "title"
                    id = "item_name"
                [/label]
            [/column]
        [/row]
        [row]
            [column]
                [grid]
                    [row]
                        [column]
                            vertical_alignment = "center"
                            horizontal_alignment = "center"
                            border = "all"
                            border_size = 5
                            [image]
                                id = "image_name"
                            [/image]
                        [/column]
                        [column]
                            horizontal_alignment = "left"
                            border = "all"
                            border_size = 5
                            [scroll_label]
                                id = "item_description"
                            [/scroll_label]
                        [/column]
                    [/row]
                [/grid]
            [/column]
        [/row]
        [row]
            [column]
                horizontal_alignment = "left"
                border = "top,left,right"
                border_size = 15
                [label]
                    wrap = true
                    id = "item_effect"
                [/label]
            [/column]
        [/row]
        [row]
            [column]
                [image]
                    label="icons/banner2.png"
                [/image]
            [/column]
        [/row]
        [row]
            [column]
                border = "all"
                border_size = 15
                [button]
                    id = "take_button"
                    return_value = 1
                [/button]
            [/column]
        [/row]
    [/grid]
[/resolution]
