#textdomain wesnoth-units
[unit_type]
    id=Jumpcat
    name= _ "Jumpcat"
    race=cats
    generate_name=no
    image="units/monsters/cat/jumpcat.png"
    profile="portraits/monsters/jumpcat.webp"
    hitpoints=40
    movement=7
    movement_type=elusivefoot
    [defense]
        frozen=50
    [/defense]
    [movement_costs]
        cave=1
        mountains=2
    [/movement_costs]
    # nothing arcane here, all animal
    [resistance]
        arcane=90
    [/resistance]
    experience=100
    {AMLA_DEFAULT}
    level=2
    alignment=chaotic
    advances_to=null
    cost=26
    usage=scout
    description=_ "Jumpcats are opportunistic predators with keen senses and fast reflexes, but very little bulk, so they are easily dispatched if they can be hit, and easily scared off if they can’t. One of the most distinctive features of these odd creatures is the hard clump of twigs, clay, and rocks they carry on their tail, which is their primary offensive weapon. Their actions are mostly driven by instinct, but they are sometimes used as assassins by more sophisticated handlers."
    # To Do: Get smaller cat sounds
    die_sound=drake-die.ogg
    abilities_list=nightstalk
    # TO DO - make this more than just a single frame
    [standing_anim]
        start_time=-50
        [frame]
            image="units/monsters/cat/jumpcat-arch.png:150"
        [/frame]
    [/standing_anim]
    [standing_anim]
        start_time=-50
        {STANDARD_IDLE_FILTER}
        [frame]
            image="units/monsters/cat/jumpcat-rest.png:150"
        [/frame]
    [/standing_anim]
    [sheath_weapon_anim]
        start_time=0
        {STANDARD_IDLE_FILTER}
        [frame]
            image="units/monsters/cat/jumpcat-transition.png:140"
        [/frame]
    [/sheath_weapon_anim]
    [movement_anim]
        start_time=0
        [frame]
            image="units/monsters/cat/jumpcat-moving.png:150"
        [/frame]
    [/movement_anim]
    [defend]
        start_time=-126
        [if]
            hits=yes
            hit_sound_start_time=-25
            [frame]
                image=units/monsters/cat/jumpcat-defend[1,2,1].png:[1,250,1]
            [/frame]
            [hit_sound_frame]
                sound={SOUND_LIST:DRAKE_HIT}
            [/hit_sound_frame]
        [/if]
        [else]
            [frame]
                image=units/monsters/cat/jumpcat-defend[1,2-miss,1].png:[1,250,1]
            [/frame]
        [/else]
    [/defend]
    [defend]
        [filter_attack]
            range=melee
        [/filter_attack]
        hits=no
        start_time=-200
        cat_start_time=-200
        cat_y=0~-15:60,-15~-30:90,-30:40,-30~-15:110,-15~0:100
        cat_offset=0~-0.1:360,-0.1~0:40
        frequency=3
        [frame]
            image=units/monsters/cat/jumpcat-jump-shadow[1~3,2,1].png:[60,80,80,90,90]
            layer=39
        [/frame]
        [cat_frame]
            image=units/monsters/cat/jumpcat-jump-[1~5,1].png:[60,60,60,80,90,70]
            auto_vflip=no
            primary=yes
        [/cat_frame]
    [/defend]
    [attack]
        name=claws
        description=_"claws"
        range=melee
        type=blade
        damage=5
        number=3
        icon=attacks/claws-animal.png
        specials_list=backstab
    [/attack]
    [attack]
        name=tail
        description=_"tail"
        icon=attacks/tail-jumpcat.png
        type=impact
        range=melee
        damage=13
        number=2
    [/attack]
    [attack_anim]
        [filter_attack]
            name=claws
        [/filter_attack]
        offset=0.0~-0.08:270,-0.08~0.6:100,0.6~0.0:250
        start_time=-370
        [frame]
            image="units/monsters/cat/jumpcat-claws[1~5].png:[90,90,100,100,240]"
        [/frame]
        [frame]
            image="units/monsters/cat/jumpcat.png:1"
        [/frame]
        {SOUND:HIT claws.ogg -100}
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=tail
        [/filter_attack]
        offset=0.0~-0.05:370,-0.05~0.6:100,0.6~0.0:250
        start_time=-450
        [frame]
            image="units/monsters/cat/jumpcat-tail[1~7,3].png:[90*4,120,90*2,70]"
        [/frame]
        [frame]
            image="units/monsters/cat/jumpcat.png:1"
        [/frame]
        {SOUND:HIT fist.ogg -100}
    [/attack_anim]
[/unit_type]
