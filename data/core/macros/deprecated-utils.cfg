#define WEAPON_SPECIAL_DEFLECT
#deprecated 3 1.21 This special is no longer used in any core units. On the Naga Sicarius, it has been replaced with the "Guard" special.
    # Canned definition of the Deflect ability to be included in a
    # [specials] clause.
    [chance_to_hit]
        id=deflect
        name= _ "deflect"
        description= _ "When used defensively, this attack reduces the opponent’s chance to hit by 10%."
        special_note=_"This unit’s defensive techniques reduce the chance of a successful enemy attack."
        sub=10
        active_on=defense
        apply_to=opponent
    [/chance_to_hit]
#enddef

#define WEAPON_SPECIAL_ABSORB AMT
#deprecated 3 1.21 This special has a poor description and is no longer used in any core units. On the Naga Shield/High Guard, it has been replaced with the "Guard" special.
    # Canned definition of the Absorb ability to be included in a
    # [specials] clause.
    [damage]
        id=absorb
        name= _ "absorb"
        description= _ "This attack puts the unit in good defensive position, and it absorbs some of the damage dealt by an enemy strike."
        special_note= _ "This unit can block enemy strikes, so that it takes reduced damage when hit."
        multiply={AMT}
        apply_to=opponent
    [/damage]
#enddef

#define DRAKE_FLYING_ANIM STANDING_IMAGE FLYING_IMAGE
#deprecated 3 1.21 This is for the old style Drake animations. If you still need this for some reason, copy the macro definition into your add-on.
    [standing_anim]
        start_time=0
        [filter]
            [filter_location]
                terrain_type=!,W*,Qx*,Ql*
                [or]
                    terrain_type=Wwf,Wwr,*^V*
                [/or]
            [/filter_location]
        [/filter]
        [frame]
            image={STANDING_IMAGE}:150
        [/frame]
    [/standing_anim]

    [standing_anim]
        start_time=0
        layer=60
        submerge=0.01
        [filter]
            [filter_location]
                terrain_type=W*,Qx*,Ql*
                [not]
                    terrain_type=Wwf,Wwr,*^V*
                [/not]
            [/filter_location]
        [/filter]
        [frame]
            image={FLYING_IMAGE}:150
        [/frame]
    [/standing_anim]
#enddef

