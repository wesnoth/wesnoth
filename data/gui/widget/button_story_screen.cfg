#textdomain wesnoth-lib

## Specialized buttons definitions used in the story screen
#  Modified version of _GUI_RESOLUTION_MINIMAL that uses
#  the original size of the image

#define _GUI_RESOLUTION_ORIGINAL_SIZE RESOLUTION IMAGE
	[resolution]

		{RESOLUTION}

		min_width = 0
		min_height = 0

		default_width = 128
		default_height = 128

		max_width = 0
		max_height = 0

		[state_enabled]

			[draw]

				[image]
					name = {IMAGE} + ".png"
				[/image]

			[/draw]

		[/state_enabled]

		[state_disabled]

			[draw]

				[image]
					name = {IMAGE} + ".png~GS()"
				[/image]

			[/draw]

		[/state_disabled]

		[state_pressed]

			[draw]

				[image]
					name = {IMAGE} + ".png~BLEND(255,63,0,0.7)"
				[/image]

			[/draw]

		[/state_pressed]

		[state_focused]

			[draw]

				[image]
					name = {IMAGE} + ".png~BLEND(255,255,0,0.2)"
				[/image]

			[/draw]

		[/state_focused]

	[/resolution]
#enddef

#  Modified version of _GUI_DEFINITION_MINIMAL that uses
#  the original size of the image
#define _GUI_DEFINITION_ORIGINAL_SIZE ID DESCRIPTION IMAGE
[button_definition]
	id = {ID}
	description = {DESCRIPTION}

	{_GUI_RESOLUTION_ORIGINAL_SIZE () ({IMAGE})}
[/button_definition]
#enddef

### Text helper macro, from button_default.cfg

# Same as GUI__CENTERED_TEXT but with a slight vertical offset for the text to make it look better
# Also uses font_family=script
#define _GUI_BUTTON_TEXT FONT_SIZE FONT_STYLE FONT_COLOR
	[text]
		# relative position of text so that it doesn't overlap with the preceding text
		x = {GUI__TEXT_HORIZONTALLY_CENTRED}
		#x = "(text_width + 20)"
		y = "(max((height - text_height - 2) / 2, 0))"
		w = "(text_width)"
		h = "(text_height)"
		font_size = {FONT_SIZE}
		font_style = {FONT_STYLE}
		font_family = script
		color = "{FONT_COLOR},255"
		text = "(text)"
		text_markup = "(text_markup)"
	[/text]
#enddef

#  Modified version of _GUI_DEFINITION_MINIMAL that
#  shows header text with decorations
#  to the left and right side. Used in story_viewer.
#  Uses BLEND to generate active/clicked versions
#  of the images used on-the-fly.
#define _GUI_RESOLUTION_HEADER RESOLUTION ACTIVE_TINT PRESS_TINT
	[resolution]

		{RESOLUTION}

		min_width = 128
		min_height = 32

		default_width = 150
		default_height = 32

		max_width = 0
		max_height = 0

		[state_enabled]

			[draw]

				[image]
					x = 0
					name = "misc/dots.png"
				[/image]
				{_GUI_BUTTON_TEXT 26 () ("215, 215, 215")}
				[image]
					x = "(width - image_width)"
					name = "misc/dots.png~FL()"
				[/image]

			[/draw]

		[/state_enabled]

		[state_disabled]

			[draw]

				[image]
					x = 0
					name = "misc/dots.png"
				[/image]
				{_GUI_BUTTON_TEXT 26 () ("128, 128, 128")}
				[image]
					x = "(width - image_width)"
					name = "misc/dots.png~FL()"
				[/image]

			[/draw]

		[/state_disabled]

		[state_pressed]

			[draw]

				[image]
					x = 0
					name = "misc/dots.png~BLEND({PRESS_TINT},0.7)"
				[/image]
				{_GUI_BUTTON_TEXT 26 () ({PRESS_TINT})}
				[image]
					x = "(width - image_width)"
					name = "misc/dots.png~FL()~BLEND({PRESS_TINT},0.7)"
				[/image]

			[/draw]

		[/state_pressed]

		[state_focused]

			[draw]
				[image]
					x = 0
					name = "misc/dots.png~BLEND({ACTIVE_TINT},0.2)"
				[/image]
				{_GUI_BUTTON_TEXT 26 () ({ACTIVE_TINT})}
				[image]
					x = "(width - image_width)"
					name = "misc/dots.png~FL()~BLEND({ACTIVE_TINT},0.2)"
				[/image]

			[/draw]

		[/state_focused]

	[/resolution]
#enddef

#define _GUI_DEFINITION_HEADER ID DESCRIPTION ACTIVE_TINT PRESS_TINT
[button_definition]
	id = {ID}
	description = {DESCRIPTION}

	{_GUI_RESOLUTION_HEADER () ({ACTIVE_TINT}) ({PRESS_TINT})}
[/button_definition]
#enddef

# Big decorated left/right/skip buttons for story screen

{_GUI_DEFINITION_ORIGINAL_SIZE
	"right_arrow_story"
	"Big right ornate arrow for story"
	"misc/ornate_big_arrow_decor_right"
}

{_GUI_DEFINITION_ORIGINAL_SIZE
	"left_arrow_story"
	"Big right ornate arrow for story"
	"misc/ornate_big_arrow_decor_left"
}

{_GUI_DEFINITION_HEADER
	"header_story"
	"Header with decorations for story"
	"255,255,0"
	"255,63,0"
}

#undef _GUI_DEFINITION_ORIGINAL_SIZE
#undef _GUI_DEFINITION_HEADER
#undef _GUI_RESOLUTION_ORIGINAL_SIZE
#under _GUI_RESOLUTION_HEADER
#undef _GUI_BUTTON_TEXT
