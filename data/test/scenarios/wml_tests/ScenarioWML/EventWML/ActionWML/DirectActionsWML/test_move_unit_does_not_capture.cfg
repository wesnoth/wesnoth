# wmllint: no translatables

#####
# API(s) being tested: [move_unit]
##
# Actions:
# Create a village next to Alice's keep.
# Move Alice onto the village with [move_unit].
##
# Expected end state:
# The village isn't captured, and Alice still has movement points remaining.
#####
{GENERIC_UNIT_TEST "test_move_unit_does_not_capture" (
    [event]
        name=side 1 turn 1

        [terrain]
            x,y=8,3
            terrain=Dd^Vda
        [/terrain]

        [move_unit]
            id=alice
            to_x=8
            to_y=3
        [/move_unit]

        {ASSERT (
            [have_location]
                owner_side=1
                count=0
            [/have_location]
        )}

        # Not only does move_unit not capture, move_unit itself doesn't cost movement points
        {ASSERT (
            [have_unit]
                id=alice
                [filter_wml]
                    moves=6
                [/filter_wml]
            [/have_unit]
        )}

        {SUCCEED}
    [/event]
)}
