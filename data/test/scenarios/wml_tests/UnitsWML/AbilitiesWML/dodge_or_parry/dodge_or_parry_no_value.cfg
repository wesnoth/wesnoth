#textdomain wesnoth-test

#####
# API(s) being tested: [dodge_or_parry]value=
##
# Actions:
# Give the leaders a dodge_or_parry ability missing the value attribute.
# Have the side 1 leader attack the side 2 leader with both its weapons
##
# Expected end state:
# The chance to hit is not changed.
# No errors are logged.
#####
{COMMON_KEEP_A_B_UNIT_TEST "dodge_or_parry_no_value" (
    [event]
        name = start

        {SET_HP VALUE=1000}

        [modify_unit]
            [filter]
            [/filter]
            [effect]
                apply_to = new_ability
                [abilities]
                    {TEST_ABILITY attacks 100 () SELF=yes}
                    [dodge_or_parry]
                        id = "test-dodge_or_parry"
                        name = _"test-dodge_or_parry"
                        affect_self = yes
                        affect_allies = no
                        affect_enemies = no
                        cumulative = no
                    [/dodge_or_parry]
                [/abilities]
            [/effect]
        [/modify_unit]
    [/event]

    {CHECK_STRIKES "0,0" () COMPARE=numerical_not_equals (CHANCE_TO_HIT=)}
    {CHECK_STRIKES "100,100" ({SUCCEED}) COMPARE=numerical_not_equals (CHANCE_TO_HIT=)}
)}
