# wmllint: no translatables

#####
# API(s) being tested: [berserk]priority=
##
# Actions:
# Give the leaders two berserk ability with one with both value=5 and another with value=10 and priority=-10
# Have the side 1 leader attack the side 2 leader with both its weapons
##
# Expected end state:
# The calculation chooses the ability with the higher priority rather than the one with the higher value.
# The side 1 leader's first weapon strikes 10 times (2*5)
# The side 1 leader's second weapon strikes 20 times (4*5)
#####
#ifndef SCHEMA_VALIDATION
{COMMON_KEEP_A_B_UNIT_TEST "berserk_low_priority" (
    [event]
        name = start

        [modify_unit]
            [filter]
            [/filter]
            [effect]
                apply_to = new_ability
                [abilities]
                    {TEST_ABILITY berserk 5 () SELF=yes}
                    {TEST_ABILITY berserk 10 (priority=-10) SELF=yes}
                [/abilities]
            [/effect]
        [/modify_unit]
    [/event]

    {CHECK_STRIKES "10,20" ({SUCCEED})}
)}
#endif
