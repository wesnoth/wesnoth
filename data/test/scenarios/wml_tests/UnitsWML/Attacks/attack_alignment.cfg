#textdomain wesnoth-test
#####
# API(s) being tested: [attack]attack_alignment=
##
# Actions:
# Give a lawful time of day.
# Give the leaders a attack_alignment of lawful
# Have the leader fighting each other.
##
# Expected end state:
# The fighter inflicte 25% more damage because attack_alignment is lawful and lawful time of day.
#####
{COMMON_KEEP_A_B_UNIT_TEST "attack_alignment_test" (
    [event]
        name=start
        [modify_unit]
            [filter]
            [/filter]
            [effect]
                apply_to=attack
                set_attack_alignment=lawful
            [/effect]
        [/modify_unit]

        {ATTACK_AND_VALIDATE 125}
        {SUCCEED}
    [/event]
) TIME=MORNING}

#####
# API(s) being tested: [attack]attack_alignment=
##
# Actions:
# Give a a illumination ability to leaders.
# Give the leaders a attack_alignment of lawful
# Have the leader fighting each other.
##
# Expected end state:
# The fighter inflicte 25% more damage because attack_alignment is lawful and ilumination of units
#####
{COMMON_KEEP_A_B_UNIT_TEST "attack_alignment_test_with_illuminates" (
    [event]
        name=start
        [modify_unit]
            [filter]
            [/filter]
            [effect]
                apply_to=new_ability
                [abilities]
                    {ABILITY_ILLUMINATES}
                [/abilities]
            [/effect]
            [effect]
                apply_to=attack
                set_attack_alignment=lawful
            [/effect]
        [/modify_unit]

        {ATTACK_AND_VALIDATE 125}
        {SUCCEED}
    [/event]
)}

#define FILTER_ATTACK_ALIGNMENT_TEST
    [event]
        name=turn 1
        [object]
            silent=yes
            [effect]
                apply_to=attack
                set_attack_alignment=lawful
            [/effect]
            [filter]
                id=alice
            [/filter]
        [/object]
        [modify_unit]
            [filter]
            [/filter]
            # Make sure they don't die during the attacks
            [status]
                invulnerable=yes
            [/status]
        [/modify_unit]
        [do_command]
            [move]
                x=7,13
                y=3,4
            [/move]
            [attack]
                [source]
                    x,y=13,4
                [/source]
                [destination]
                    x,y=13,3
                [/destination]
            [/attack]
        [/do_command]
        [end_turn][/end_turn]
        {VARIABLE triggers_on_attack 0}
    [/event]
#enddef

# API(s) being tested: [event][filter_attack]attack_alignment=
##
# Actions:
# Give Alice attack_alignment=lawful.
# Define events that use filter_attack matching Alice's attack_alignment.
# Have Alice attack bob.
##
# Expected end state:
# An event triggers when Alice attacks during side 1's turn.
#####
{GENERIC_UNIT_TEST event_test_filter_attack_attack_alignment (
    {FILTER_ATTACK_ALIGNMENT_TEST}

    # Event when Alice attacks
    [event]
        name=attack
        first_time_only=no
        [filter_attack]
            attack_alignment=lawful
        [/filter_attack]
        {ASSERT ({VARIABLE_CONDITIONAL side_number equals 1})}
        {VARIABLE_OP triggers_on_attack add 1}
    [/event]

    [event]
        name=turn 2
        {ASSERT ({VARIABLE_CONDITIONAL triggers_on_attack equals 1})}
        {SUCCEED}
    [/event]
)}

# API(s) being tested: [event][filter_attack]attack_alignment=
##
# Actions:
# Give Alice attack_alignment=lawful.
# Define events that use filter_attack not matching Alice's attack_alignment.
# Have Alice attack bob.
##
# Expected end state:
# No event triggers when Alice attacks during side 1's turn.
#####
{GENERIC_UNIT_TEST event_test_filter_attack_attack_alignment_no_match (
    {FILTER_ATTACK_ALIGNMENT_TEST}

    # Event when Alice attacks
    [event]
        name=attack
        first_time_only=no
        [filter_attack]
            attack_alignment=neutral
        [/filter_attack]
        {ASSERT ({VARIABLE_CONDITIONAL side_number equals 1})}
        {VARIABLE_OP triggers_on_attack add 1}
    [/event]

    [event]
        name=turn 2
        {ASSERT ({VARIABLE_CONDITIONAL triggers_on_attack equals 0})}
        {SUCCEED}
    [/event]
)}

