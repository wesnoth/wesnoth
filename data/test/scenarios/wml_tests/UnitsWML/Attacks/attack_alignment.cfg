#textdomain wesnoth-test
#####
# API(s) being tested: [attack]attack_alignment=
##
# Actions:
# Give a lawful time of day.
# Give the leaders a attack_alignment of lawful
# Have the leader fighting each other.
##
# Expected end state:
# The fighter inflicte 25% more damage because attack_alignment is lawful and lawful time of day.
#####
{COMMON_KEEP_A_B_UNIT_TEST "attack_alignment_test" (
    [event]
        name=start
        [modify_unit]
            [filter]
            [/filter]
            [effect]
                apply_to=attack
                set_attack_alignment=lawful
            [/effect]
        [/modify_unit]

        {ATTACK_AND_VALIDATE 125}
        {SUCCEED}
    [/event]
) TIME=MORNING}

#####
# API(s) being tested: [attack]attack_alignment=
##
# Actions:
# Give a a illumination ability to leaders.
# Give the leaders a attack_alignment of lawful
# Have the leader fighting each other.
##
# Expected end state:
# The fighter inflicte 25% more damage because attack_alignment is lawful and ilumination of units
#####
{COMMON_KEEP_A_B_UNIT_TEST "attack_alignment_test_with_illuminates" (
    [event]
        name=start
        [modify_unit]
            [filter]
            [/filter]
            [effect]
                apply_to=new_ability
                [abilities]
                    {ABILITY_ILLUMINATES}
                [/abilities]
            [/effect]
            [effect]
                apply_to=attack
                set_attack_alignment=lawful
            [/effect]
        [/modify_unit]

        {ATTACK_AND_VALIDATE 125}
        {SUCCEED}
    [/event]
)}
