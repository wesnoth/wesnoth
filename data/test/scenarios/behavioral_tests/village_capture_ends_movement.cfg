# wmllint: no translatables

#####
# API(s) being tested: N/A
##
# Actions:
# Create a village next to Alice's keep.
# Reduce Alice's remaining moves so the AI can't attack Bob.
# Leave the AI to capture the village.
##
# Expected end state:
# The village is captured, and the unit has no remaining movement points.
#####
{GENERIC_UNIT_TEST "village_capture_ends_movement" (
    [event]
        name=side 1 turn 1

        [terrain]
            x,y=8,3
            terrain=Dd^Vda
        [/terrain]

        [modify_unit]
            [filter]
                id=alice
            [/filter]
            moves=3 # if Alice has 5 or more, Bob gets attacked instead
        [/modify_unit]
    [/event]

    [event]
        name=side 2 turn 1

        {ASSERT (
            [have_location]
                owner_side=1
            [/have_location]
        )}

        {ASSERT (
            [have_unit]
                id=alice
                [filter_wml]
                    moves=0
                [/filter_wml]
            [/have_unit]
        )}

        {SUCCEED}
    [/event]
) SIDE1_CONTROLLER=ai}
