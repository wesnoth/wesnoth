# wmllint: no translatables

#####
# API(s) being tested: N/A
##
# Actions:
# Create a village next to Alice's keep.
# Move Alice onto the village with [do_command].
##
# Expected end state:
# The village is captured, and Alice has no movement points remaining.
#####
{GENERIC_UNIT_TEST "village_capture_ends_movement" (
    [event]
        name=side 1 turn 1

        [terrain]
            x,y=8,3
            terrain=Dd^Vda
        [/terrain]

        [do_command]
            [move]
                x=7,8
                y=3,3
            [/move]
        [/do_command]

        {ASSERT (
            [have_location]
                owner_side=1
                count=1
            [/have_location]
        )}

        {ASSERT (
            [have_unit]
                id=alice
                [filter_wml]
                    moves=0
                [/filter_wml]
            [/have_unit]
        )}

        {SUCCEED}
    [/event]
)}
