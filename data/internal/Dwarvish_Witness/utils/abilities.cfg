#textdomain wesnoth-thot

#define ABILITY_WITNESS
    # Canned definition of the Witness ability to be included in an
    # [abilities] clause.
    [leadership]
        id=witness
        value=25
        cumulative=no
        name= _ "witness"
        female_name= _ "female^witness"
        description= _ "Adjacent allied dwarves gain +25% damage, or +100% damage when they fight higher-level opponents."
        special_note= _ "This unit inspires adjacent allied dwarves, increasing their damage — particularly when they fight higher-level opponents."
        affect_self=no
        affect_allies=yes
        [affect_adjacent]
            [filter]
                race=dwarf
                [or]
                    type_adv_tree=Gryphon Rider
                [/or]
            [/filter]
        [/affect_adjacent]
        [filter_opponent]
            formula="level <= other.level"
        [/filter_opponent]
    [/leadership]
    # invisible ability to implement the second part of the behavior: add 100% damage when enemy is higher level
    [leadership]
        id=witness
        value=100
        cumulative=no
        affect_self=no
        affect_allies=yes
        [affect_adjacent]
            [filter]
                race=dwarf
                [or]
                    type_adv_tree=Gryphon Rider
                [/or]
            [/filter]
        [/affect_adjacent]
        # [filter_student] and if(other) is used so that this filter doesn't make the sidebar show +100% damage
        [filter_student]
            formula="if(other, other.level > level, 0)"
        [/filter_student]
    [/leadership]
#enddef
